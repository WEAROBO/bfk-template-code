                    </div>
                    <div class="cart-item">

                        <span class="cart-item__count">1</span>
                        <button class="cart-item__btn" aria-label="수량 증가"><span class="cart-item__icon--plus"></span></button>
                      </div>
                      <div class="cart-item__price">
                        600원

                      </div>
                    </div>
                    <div class="cart-item">
                      <div class="cart-item__name"><span class="cart-item__index">3</span>크런키바</div>
                      <div class="cart-item__quantity">
                        <button class="cart-item__btn" aria-label="수량 감소" disabled><span class="cart-item__icon--minus"></span></button>
                        <span class="cart-item__count">1</span>
                        <button class="cart-item__btn" aria-label="수량 증가"><span class="cart-item__icon--plus"></span></button>
                      </div>
                      <div class="cart-item__price">
                        600원
                        <button class="cart-item__delete" aria-label="삭제"><span class="cart-item__icon--delete"></span></button>
                      </div>
                    </div>
                    <div class="cart-item">
                      <div class="cart-item__name"><span class="cart-item__index">4</span>망고바</div>
                      <div class="cart-item__quantity">
                        <button class="cart-item__btn" aria-label="수량 감소" disabled><span class="cart-item__icon--minus"></span></button>
                        <span class="cart-item__count">1</span>
                        <button class="cart-item__btn" aria-label="수량 증가"><span class="cart-item__icon--plus"></span></button>
                      </div>
                      <div class="cart-item__price">
                        600원
                        <button class="cart-item__delete" aria-label="삭제"><span class="cart-item__icon--delete"></span></button>
                      </div>
                    </div>                    
                    <div class="cart-item cart-item--active">
                      <div class="cart-item__name"><span class="cart-item__index">5</span>샤인머스캣바</div>
                      <div class="cart-item__quantity">
                        <button class="cart-item__btn" aria-label="수량 감소"><span class="cart-item__icon--minus"></span></button>
                        <span class="cart-item__count">2</span>
                        <button class="cart-item__btn" aria-label="수량 증가"><span class="cart-item__icon--plus"></span></button>
                      </div>

                      </div>

                  </div>
                </div>
                <!-- Scroll -->

                    <button class="cart-scroll__btn" aria-label="이전 페이지" disabled>
                      <span class="scroll-icon-up"></span>
                    </button>

                    <span class="cart__summary-label">합계</span>

            <div class="control-bar__sound">

              </button>
              <div class="control-bar__sound-status">
                <span class="control-bar__sound-icon control-bar__sound-icon--volume" aria-hidden="true"></span>
                <span class="control-bar__sound-level" aria-live="polite">3</span>
              </div>
              <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
                <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
              </button>
            </div>
          </footer>
          
          <div class="backdrop">
            <div class="modal__wrap">
              <div class="modal">
                <div class="modal__title">포인트 조회를 위해 <br class="full-screen">전화번호를 입력하세요.</div>           
                <div class="modal__body">
                  <div class="modal__content">
                    <div class="keyboard">
                      <div class="phone-input__area">
                        <input type="text" id="phoneInput" class="phone-input__field" value="010 - 1234 - 1234" readonly>
                        <img src="../resources/img/svg/icon_visible-on.svg" id="toggleEye" class="phone-input__toggle" alt="보이기 토글">
                      </div>

                      <div class="phone-keypad">
                        <button class="phone-keypad__button">1</button>
                        <button class="phone-keypad__button">2</button>
                        <button class="phone-keypad__button">3</button>
                        <button class="phone-keypad__button">4</button>
                        <button class="phone-keypad__button">5</button>
                        <button class="phone-keypad__button">6</button>
                        <button class="phone-keypad__button">7</button>
                        <button class="phone-keypad__button">8</button>
                        <button class="phone-keypad__button">9</button>
                        <button class="phone-keypad__button type2" data-action="delete">
                          <span class="keyboard__button__icon--delete" aria-hidden="true"></span>
                          지우기
                        </button>
                        <button class="phone-keypad__button">0</button>
                        <button class="phone-keypad__button type2" data-action="clear">
                          모두<br>지우기
                        </button>
                      </div>
                    </div>       
                  </div>
                </div>
                <div class="modal__footer">         
                  <button class="button modal__button modal__button--secondary" aria-label="취소">
                    <span class="modal__icon modal__icon--close" aria-hidden="true"></span>
                    <span class="modal__button-text">취소</span>
                  </button>
                  <button class="button modal__button modal__button--primary" aria-label="완료">
                    <span class="modal__icon modal__icon--next" aria-hidden="true"></span>
                    <span class="modal__button-text">완료</span>
                  </button>
                </div>   
              </div>
            </div>      
          </div>            

        </div>
      </div>
    </div> 

    <script>
      const input = document.getElementById("phoneInput");
      const buttons = document.querySelectorAll(".phone-keypad__button");
      const toggleEye = document.getElementById("toggleEye");
      let phoneValue = "01012345678";

      function formatPhone(num) {
        num = num.replace(/[^0-9]/g, "");
        if (num.length < 4) return num;
        if (num.length < 8) return num.replace(/(\d{3})(\d{1,4})/, "$1-$2");
        return num.replace(/(\d{3})(\d{4})(\d{1,4})/, "$1-$2-$3");
      }

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;
          const val = btn.textContent.trim().replace(/[^0-9]/g, ''); 

          if (action === "delete") {
            phoneValue = phoneValue.slice(0, -1);
          } else if (action === "clear") {
            phoneValue = "";
          } else if (val) {
            if (phoneValue.length < 11) {
              phoneValue += val;
            }
          }
          input.value = formatPhone(phoneValue);
        });
      });

      let isHidden = false; 
      toggleEye.addEventListener("click", () => {
        isHidden = !isHidden;
        
        input.type = isHidden ? "password" : "text"; 
        
        toggleEye.src = isHidden
          ? "../resources/img/svg/icon_visible-off.svg"
          : "../resources/img/svg/icon_visible-on.svg";
          
        toggleEye.alt = isHidden ? "전화번호 보이기" : "전화번호 숨기기"; 
      });
    </script>

  </body>
</html>
