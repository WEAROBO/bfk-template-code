<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>6_기타 공통 화면_1_거스름돈 포인트 알림</title>
  </head>
  <body class="lower-screen">
    <div class="container-wrap">    
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button type="button" class="button header__button" aria-label="처음으로">
              <span class="header__icon header__icon--home" aria-hidden="true"></span>
              <span class="header__button-text">처음으로</span>
            </button>
            <div class="header__actions">     
              <div class="header__action header__action--call">
                <span class="header__icon header__icon--call" aria-hidden="true"></span>
                <span class="header__action-text">문의 1600-0000</span>
              </div>
            </div>
          </div>
          
          <div class="progress-steps">
            <div class="progress-step progress-step--completed">
              <div class="progress-step__index"><span><strong>1</strong></span></div>
              <div class="progress-step__label">바코드 스캔</div>
            </div>
            <div class="progress-step progress-step--completed">
              <div class="progress-step__index"><span><strong>2</strong></span></div>
              <div class="progress-step__label">포인트 조회</div>
            </div>
            <div class="progress-step progress-step--current" aria-current="step">
              <div class="progress-step__index"><span><strong>3</strong></span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>4</strong></span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <main class="main">
            <div class="sub__service--cctv">
              <span class="cctv__text">CCTV 영역</span>
            </div>               
            <h1 class="main__title main__title--guide">
              <span class="main__title--alert-icon" role="img" aria-label="주의 아이콘"></span>
              100원 이하의 거스름돈은<br>포인트로 전환됩니다.
            </h1>
            <div class="payment-box">
              <div class="payment-total">
                <div class="payment-total__row">
                  <span class="payment-total__label">거스름돈</span>
                  <span class="payment-total__value">1,160원</span>
                </div>      
                <div class="payment-total__row">
                  <span class="payment-total__label">100원 이하</span>
                  <span class="payment-total__value">60원</span>
                </div>                       
              </div>
              <div class="notice-box">
                <p class="notice-box__title">
                  적립하지 않은 포인트는 소멸되며<br>
                  다시 받으실 수 없습니다.
                </p>
              </div>                   
            </div>
            <div class="notice-box__desc">
              [적립] 버튼을 누르면 포인트 적립 화면으로 이동합니다.
            </div>         

            <div class="main__bottoms main__bottoms--center">
              <button class="button main__button main__button--secondary" aria-label="적립 안함">
                <span class="button__title">적립 안함</span>
              </button>
              <button class="button main__button main-button-dark" aria-label="적립">
                <span class="button__title">적립</span>
              </button>            
            </div>
          </main>

          <footer class="control-bar control-bar--no-bg">
            <div class="control-bar__buttons">
              <button type="button" class="accessibility__button accessibility__button--high-contrast">
                <span class="accessibility__text">고대비</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--lower-screen active">
                <span class="accessibility__text">낮은화면</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--full-screen">
                <span class="accessibility__text">화면확대</span>
              </button>
            </div>
            <div class="control-bar__sound">
              <button type="button" class="control-bar__sound-button" aria-label="음량 줄이기">
                <span class="control-bar__sound-icon control-bar__sound-icon--minus" aria-hidden="true"></span>
              </button>
              <div class="control-bar__sound-status">
                <span class="control-bar__sound-icon control-bar__sound-icon--volume" aria-hidden="true"></span>
                <span class="control-bar__sound-level" aria-live="polite">3</span>
              </div>
              <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
                <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
              </button>
            </div>
          </footer>

        </div>
      </div>
    </div>
  </body>
</html>
