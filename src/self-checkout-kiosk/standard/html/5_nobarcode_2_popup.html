    <script>
    (function () {
      const itemSelect = document.querySelector('.item-select');
      if (!itemSelect) return;

      const items = Array.from(
        itemSelect.querySelectorAll('.item-select__list')
      );

      const pageSize = Number(itemSelect.dataset.pageSize) || 6;
      const totalItems = items.length;
      const totalPages = Math.ceil(totalItems / pageSize);

      const pagination = document.querySelector('.pagination');
      const prevBtn = pagination.querySelector('.pagination__button--prev');
      const nextBtn = pagination.querySelector('.pagination__button--next');
      const pageText = pagination.querySelector('.pagination__page strong');

      let currentPage = 1;

      function renderPage(page) {
        currentPage = page;

        const start = (page - 1) * pageSize;
        const end = start + pageSize;

        items.forEach((item, index) => {
          item.classList.toggle(
            'is-visible',
            index >= start && index < end
          );
        });

        // 페이지 텍스트
        pageText.textContent = page;
        pagination.querySelector('.pagination__page').innerHTML =
          `<strong>${page}</strong> / ${totalPages}`;

        // 버튼 상태
        prevBtn.disabled = page === 1;
        nextBtn.disabled = page === totalPages;
      }

      prevBtn.addEventListener('click', () => {
        if (currentPage > 1) {
          renderPage(currentPage - 1);
        }
      });

      nextBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
          renderPage(currentPage + 1);
        }
      });

      // 초기 렌더
      renderPage(1);
    })();
    </script>
