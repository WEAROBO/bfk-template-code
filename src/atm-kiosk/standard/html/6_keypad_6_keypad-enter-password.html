<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>6_키패드_6_보안키패드</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

     
          <div class="header">
            <div class="header__title">비밀번호 입력</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">5</span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>             
              <button class="button header__button" aria-label="다시듣기">
                <span class="button__title">다시듣기</span>
              </button>
              <button class="button header__button" aria-label="고대비">
                <span class="button__title">고대비</span>
              </button>
              <button class="button header__button" aria-label="화면확대">
                <span class="button__title">화면확대</span>
              </button>
            </div>
          </div>
        
          <div class="main">
            <div class="input-pw">
              <div class="input-pw-box box-style">
                <div class="input-pw-box-top box-top">
                  <h1 class="box-top-title">비밀번호를 입력하시고<br>
                    <span class="fc-blue">[확인]</span>을 누르세요
                  </h1>
                  <div class="box-top-middle">
                    <div class="otp-container">
                      <div class="otp-input">
                        <div class="otp-input__field">
                          <span class="otp-input__char"></span>
                        </div>
                        <div class="otp-input__field">
                          <span class="otp-input__char"></span>
                        </div>
                        <div class="otp-input__field">
                          <span class="otp-input__char"></span>
                        </div>
                        <div class="otp-input__field">
                          <span class="otp-input__char"></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="box-bottom">
                  <div class="input-pw-box__desc box-bottom_desc">비밀번호 입력 시 손이나 소지품으로 <br> 
                    가리고 입력해 주세요</div>
                </div>
              </div>
              <div class="input-pw-keyboard center">
                <div class="input-pw-keyboard--grid">
                  <div class="input-pw-keyboard__item" onclick="keyclick('1')">1</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('2')">2</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('3')">3</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('4')">4</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('5')">5</div>
                  <div class="input-pw-keyboard__item">
                    <img src="../resources/img/ui/nia_btn.png" alt="NIA">
                  </div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('6')">6</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('7')">7</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('8')">8</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('9')">9</div>
                  <div class="input-pw-keyboard__item">
                    <img src="../resources/img/ui/nia_btn.png" alt="NIA">
                  </div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('0')">0</div>
                  <div class="input-pw-keyboard__item large" onclick="keyclick('remeshing')">재배열</div>
                  <div class="input-pw-keyboard__item width-text" onclick="keyclick('delete')">
                    <div class="input-pw-keyboard__item-back-btn">
                      <span class="input-pw-keyboard__icon-arrow"></span>
                      <div>지우기</div>
                    </div>
                  </div>
                  <div class="input-pw-keyboard__item width-text" onclick="keyclick('delete_all')">모두<br>지우기</div>
                </div>
              </div>
            </div>
    
            <div class="main-bottom">
              <div class="main-bottom-buttons">
                <div class="button main-button-secondary">
                  <span class="secondary-btn-img"></span>
                  <span class="secondary-btn-title">취소</span>
                </div>
                <div class="button main-button-primary">
                  <span class="primary-btn-img"></span>
                  <span class="primary-btn-title">확인</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <script>
      let password = "";
      const otpFields = Array.from(document.querySelectorAll(".otp-input__field"));
      const confirmButton = document.querySelector(".main-button-primary");

      function renderPassword() {
        otpFields.forEach((field, index) => {
          const charEl = field.querySelector(".otp-input__char");
          const hasValue = index < password.length;

          field.classList.remove("otp-input__field--filled", "otp-input__field--active");

          charEl.textContent = hasValue ? "*" : "";

          if (hasValue) {
            field.classList.add("otp-input__field--filled");
          }
        });

        // active 위치
        if (password.length < otpFields.length) {
          otpFields[password.length].classList.add("otp-input__field--active");
        }

        // confirm 버튼 상태 (div라서 class로 제어)
        if (password.length === 4) {
          confirmButton.classList.remove("disabled");
        } else {
          confirmButton.classList.add("disabled");
        }
      }

      function keyclick(value) {
        if (value === "delete_all") {
          password = "";
        } else if (value === "delete") {
          password = password.slice(0, -1);
        } else if (value === "remeshing") {
          return;
        } else if (/^[0-9]$/.test(value) && password.length < 4) {
          password += value;
        }
        renderPassword();
      }

      document.addEventListener("keydown", function (event) {
        if (event.key === "Tab") {
          event.preventDefault();
          const focusableElements = Array.from(
            document.querySelectorAll(
              'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
            )
          ).filter(el => el.offsetParent !== null);

          if (!focusableElements.length) return;

          const currentIndex = focusableElements.indexOf(document.activeElement);
          const nextIndex = event.shiftKey
            ? (currentIndex <= 0 ? focusableElements.length - 1 : currentIndex - 1)
            : (currentIndex + 1) % focusableElements.length;

          focusableElements[nextIndex].focus();
          return;
        }

        if (event.key === " " || event.code === "Space") {
          event.preventDefault();
          const activeElement = document.activeElement;
          if (activeElement && typeof activeElement.click === "function") {
            activeElement.click();
          }
          return;
        }

        if (/^[0-9]$/.test(event.key)) {
          event.preventDefault();
          keyclick(event.key);
          return;
        }

        if (event.key === "Backspace") {
          event.preventDefault();
          keyclick("delete");
          return;
        }

        if (event.key === "Delete") {
          event.preventDefault();
          keyclick("delete_all");
        }
      });

      renderPassword();
    </script>
  </body>
</html>
