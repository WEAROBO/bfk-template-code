<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_입금_11_명세표 출력 선택</title>
  </head>
  <body class="high-contrast">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">명세표 출력 선택</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">5</span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>             
              <button class="button header__button" aria-label="다시듣기">
                <span class="button__title">다시듣기</span>
              </button>
              <button class="button header__button header__button--active" aria-label="고대비">
                <span class="button__title">고대비</span>
              </button>
              <button class="button header__button" aria-label="화면확대">
                <span class="button__title">화면확대</span>
              </button>
            </div>
          </div>
        
          <div class="main">
            <div class="receive-box">
              <h1 class="receive-box__title center">명세표를 받으시겠습니까?</h1>
              <div class="main-1__input-area">
                <div class="main-1__input-list">
                  <div class="main-1__input-item">
                    <div class="input-label">거래 금액</div>
                    <div class="input">
                      <span class="fc-blue">110,000</span> 
                      <span class="input-unit">원</span>
                    </div>   
                  </div>
                  <div class="main-1__input-item">
                    <div class="input-label">거래 후 잔액</div>
                    <div class="input">
                      <span class="fc-blue">110,000</span> 
                      <span class="input-unit">원</span>
                    </div>   
                  </div>
                  <div class="main-1__input-item">
                    <div class="input-label">수수료</div>
                    <div class="input">
                      <span class="fc-blue">0</span> 
                      <span class="input-unit">원</span>
                    </div>   
                  </div>
                </div>
              </div>
            </div> 
            
            <div class="main-bottom">
              <div class="main-bottom-buttons">
                <div class="button main-button-secondary">
                  <span class="secondary-btn-title">받음</span>
                </div>
                <div class="button main-button-primary">
                  <span class="primary-btn-title">받지 않음</span>
                </div>
              </div>
            </div>            
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
