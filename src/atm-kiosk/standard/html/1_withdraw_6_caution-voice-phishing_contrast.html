<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>1_출금_6_보이스피싱 예방 안내</title>
  </head>
  <body class="high-contrast">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">보이스피싱 예방 안내</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">5</span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>             
              <button class="button header__button" aria-label="다시듣기">
                <span class="button__title">다시듣기</span>
              </button>
              <button class="button header__button header__button--active" aria-label="고대비">
                <span class="button__title">고대비</span>
              </button>
              <button class="button header__button" aria-label="화면확대">
                <span class="button__title">화면확대</span>
              </button>
            </div>
          </div>
        
          <div class="main">
            <div class="warn-voice-fishing main-1">
              <h1 class="main-1__title main-1__title--red center">보이스피싱 피해예방 안내</h1>
              <div class="warn-voice-fishing-body">
                <div class="warn-voice-fishing-body__line">
                  <span class="fc-red">국세청,검찰정,금감원</span> 등을 사칭해 송금이나<br>
                  대출금 상환을 요구하는 경우 100% 보이스피싱입니다.
                </div>
                <div class="warn-voice-fishing-body__line2">
                  거래를 계속하시려면 [확인]을,<br>
                  사기성송금 여부를 확인한 뒤 거래를 원하시면 [취소]를 누르세요
                </div>    
                <div class="warn-voice-fishing-body__phone">
                  <div class="warn-voice-fishing-body__phone-desc-label">
                    <span class="warn-voice-fishing__icon-phone">
                      <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.07591 7.36424L10.1345 6.76944C11.1227 6.21153 12.3696 6.52579 13.0446 7.50346L14.3886 9.44705C14.9746 10.2949 14.893 11.3585 14.2882 12.2904C13.4667 13.5557 12.8305 14.4614 12.8305 14.4614C13.1914 15.6417 13.7936 16.7342 14.5989 17.6694C15.5388 18.7826 16.446 19.3782 17.4651 19.9505C17.4651 19.9505 18.4732 19.483 19.8498 18.8773C20.7689 18.4737 21.6969 18.2655 22.4217 18.968L24.1108 20.6032C24.5201 21.0032 24.7793 21.5317 24.8449 22.1002C24.9106 22.6686 24.7786 23.2424 24.4713 23.7251L23.7922 24.7648C23.4704 25.2666 23.0167 25.67 22.4809 25.9311C21.9451 26.1921 21.3477 26.3007 20.7543 26.2448C17.9129 25.9642 14.6791 23.8712 11.5906 20.2245C8.49879 16.5693 7.254 13.3667 7.31997 10.3625C7.34713 9.09844 8.02797 7.95381 9.07591 7.36424Z" 
                        fill="currentColor"/>
                      </svg>
                    </span>
                    문의전화
                  </div>
                  <div class="warn-voice-fishing-body__phone-desc-value">1234-1234</div>
                </div>
              </div>
            </div>
    
            <div class="main-bottom">
              <div class="main-bottom-buttons">
                <div class="button main-button-secondary">
                  <span class="secondary-btn-img"></span>
                  <span class="secondary-btn-title">취소</span>
                </div>
                <div class="button main-button-primary">
                  <span class="primary-btn-img"></span>
                  <span class="primary-btn-title">확인</span>
                </div>
              </div>
            </div>
          </div>
        
        </div>
      </div>
    </div>
  </body>
</html>
