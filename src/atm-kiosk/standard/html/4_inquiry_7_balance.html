<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>4_조회_7_잔액조회</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">잔액조회</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">100<small>%</small></small></span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>            
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button__icon--play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="도움기능">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">도움기능</span>
              </button>
            </div>
          </div>
        
          <div class="main pt-30">
            <div class="main-2">
              <div class="main-2-left main-2-left-box">
                <div class="main-2-left__title-area">
                  <h1 class="main-2-left__title">잔액을 확인하세요.</h1>
                </div>
              <div class="main-1__input-area mb-54">
                <div class="main-1__input-list">
                  <div class="main-1__input-item">
                    <div class="input-label">계좌번호</div>
                    <div class="input balance">12345678901234</div>
                    <div class="input-unit"></div>
                  </div>
                  <div class="main-1__input-item">
                    <div class="input-label">잔액</div>
                    <div class="input balance fc-blue">123,456,789,012,345</div>
                    <div class="input-unit">원</div>
                  </div>
                </div>
                </div>
              </div>
              <div class="main-2-right">
                <button class="button main_button__wt">
                  입출금내역조회
                </button>
                <button class="button main_button__wt">
                  입금내역조회
                </button>
                <button class="button main_button__wt">
                  출금내역조회
                </button>
              </div>
            </div>
    
            <div class="main-bottom mt-16">
              <div class="main-bottom-buttons right">
                <button class="button main-button-primary">
                  <span class="primary-btn-title">종료</span>
                </button>
              </div>
            </div>
          </div>
        
        </div>
      </div>
    </div>
  </body>
</html>
