<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>5_레이아웃_6_언어 선택</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">언어 선택</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">5</span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>             
              <button class="button header__button" aria-label="다시듣기">
                <span class="button__title">다시듣기</span>
              </button>
              <button class="button header__button" aria-label="고대비">
                <span class="button__title">고대비</span>
              </button>
              <button class="button header__button" aria-label="화면확대">
                <span class="button__title">화면확대</span>
              </button>
            </div>
          </div>
        
          <div class="main">
            <h1 class="main-1__title-box">변경할 언어를 선택하세요</h1>
            <div class="bank-select">
              <div class="bank-select__content">      
                <div class="bank-select__grid">   
                  <button class="bank-item">
                    <span class="bank-item__name">한국어</span>
                  </button>
                  <button class="bank-item">
                    <span class="bank-item__name">English</span>
                  </button>          
                  <button class="bank-item">
                    <span class="bank-item__name">日本語</span>
                  </button>
                  <button class="bank-item">
                    <span class="bank-item__name">中文</span>
                  </button>                                                                 

                  <button class="bank-item">
                    <span class="bank-item__name">Español</span>
                  </button>
                  <button class="bank-item">
                    <span class="bank-item__name">Tiếng Việt</span>
                  </button>
                  <button class="bank-item">
                    <span class="bank-item__name">Русский</span>
                  </button>
                  <button class="bank-item" disabled>
                    <span class="bank-item__name">준비 중</span>
                  </button>

                  <button class="bank-item" disabled>
                    <span class="bank-item__name">준비 중</span>
                  </button>
                  <button class="bank-item" disabled>
                    <span class="bank-item__name">준비 중</span>
                  </button>
                  <button class="bank-item" disabled>
                    <span class="bank-item__name">준비 중</span>
                  </button>
                  <button class="bank-item" disabled>
                    <span class="bank-item__name">준비 중</span>
                  </button>      
                </div> 
                <div class="pagination-controller">
                  <button class="pagination-controller__button arrow-up" aria-label="이전 페이지" disabled>
                    <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M28.7372 21.4484C29.5227 20.8076 30.6816 20.8538 31.4139 21.5861L45.4139 35.5861C46.195 36.3671 46.195 37.6331 45.4139 38.4142C44.6329 39.1952 43.3668 39.1952 42.5858 38.4142L29.9998 25.8282L17.4139 38.4142C16.6329 39.1952 15.3668 39.1952 14.5858 38.4142C13.8047 37.6331 13.8047 36.3671 14.5858 35.5861L28.5858 21.5861L28.7372 21.4484Z" 
                      fill="currentColor"/>
                    </svg>
                  </button>        
                  <div class="pagination-controller__info"><strong class="fc-blue">1</strong>/1</div>        
                  <button class="pagination-controller__button arrow-down" aria-label="다음 페이지" disabled>
                    <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M28.7372 38.5516C29.5227 39.1924 30.6816 39.1462 31.4139 38.4139L45.4139 24.4139C46.195 23.6329 46.195 22.3669 45.4139 21.5858C44.6329 20.8048 43.3668 20.8048 42.5858 21.5858L29.9998 34.1718L17.4139 21.5858C16.6329 20.8048 15.3668 20.8048 14.5858 21.5858C13.8047 22.3669 13.8047 23.6329 14.5858 24.4139L28.5858 38.4139L28.7372 38.5516Z"
                       fill="currentColor"/>
                    </svg>
                  </button>
                </div> 
              </div> 
            </div> 
    
            <div class="main-bottom">
              <div class="main-bottom-buttons">
                <div class="button main-button-secondary">
                  <span class="secondary-btn-img"></span>
                  <span class="secondary-btn-title">취소</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
