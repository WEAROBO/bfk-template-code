<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>3_이체_7_은행 선택</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">금융기관 선택</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">100<small>%</small></small></span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>            
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button__icon--play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="도움기능">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">도움기능</span>
              </button>
            </div>
          </div>
          
          <div class="main pt-30">
            <div class="main-3">
              <div class="main-3-left">
                <button class="button main_button__wt">
                  <span class="bank__img-post" aria-hidden="true"></span>
                  <span class="button__title">우체국</span>
                </button>
                <button class="button main_button__wt">
                  <span class="bank__img-kb" aria-hidden="true"></span>
                  <span class="button__title">KB국민은행</span>
                </button>
                <button class="button main_button__wt">
                  <span class="bank__img-shinhan" aria-hidden="true"></span>
                  <span class="button__title">신한은행</span>
                </button>
                <button class="button main_button__wt">
                  <span class="bank__img-hana" aria-hidden="true"></span>
                  <span class="button__title">하나은행</span>
                </button>
                <button class="button main_button__wt">
                  <span class="bank__img-ibk" aria-hidden="true"></span>
                  <span class="button__title">IBK기업은행</span>
                </button>
              </div>
              <div class="main-3-center main-3-center-box">
                <h1 class="main-3-center__title">원하시는 은행을 <br/> 선택하세요.</h1>
                <div class="main-3-center__desc mt-55">원하시는 은행이 없으면<br>[기타은행]을 누르세요.</div>
              </div>
              <div class="main-3-right">
                <button class="button main_button__wt">
                  <span class="bank__img-woori" aria-hidden="true"></span>
                  <span class="button__title">우리은행</span>
                </button>
                <button class="button main_button__wt">
                  <span class="bank__img-nonghyup" aria-hidden="true"></span>
                  <span class="button__title">농협은행</span>
                </button>
                <button class="button main_button__wt">
                  <span class="bank__img-sc" aria-hidden="true"></span>
                  <span class="button__title">SC제일은행</span>
                </button>
                <button class="button main_button__wt">국세/지방세입</button>
                <button class="button main_button__white">기타은행</button>
              </div>
            </div>
    
            <div class="main-bottom mt-16">
              <div class="main-bottom-buttons">
                <div class="button main-button-secondary">
                  <span class="secondary-btn-img"></span>
                  <span class="secondary-btn-title">취소</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
