<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>6_키패드_4_3*4 키패드</title>
  </head>
  <body class="high-contrast">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">계좌번호 입력</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">5</span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>             
              <button class="button header__button" aria-label="다시듣기">
                <span class="button__title">다시듣기</span>
              </button>
              <button class="button header__button header__button--active" aria-label="고대비">
                <span class="button__title">고대비</span>
              </button>
              <button class="button header__button" aria-label="화면확대">
                <span class="button__title">화면확대</span>
              </button>
            </div>
          </div>
        
          <div class="main">
            <div class="input-account">
              <div class="input-account-box box-style">
                <div class="input-account-box-top box-top">
                  <h1 class="box-top-title">계좌번호를 입력하시고<br>
                    <span class="fc-blue">[확인]</span>을 누르세요
                  </h1>
                  <div class="box-top-middle">
                    <input class="input-account-box__input" placeholder="000000-00-000000"></input>
                  </div>
                </div>
                <div class="box-bottom">
                  <div class="input-account-box__desc box-bottom_desc">
                    공공기관 및 금융회사 직원을 사칭하는<br>
                    사기전화에 주의하세요
                  </div>
                </div>
              </div>    
              <div class="input-account-keyboard center">
                <div class="input-account-keyboard--grid">
                  <div class="input-pw-keyboard__item">1</div>
                  <div class="input-pw-keyboard__item">2</div>
                  <div class="input-pw-keyboard__item">3</div>
                  <div class="input-pw-keyboard__item">4</div>
                  <div class="input-pw-keyboard__item">5</div>
                  <div class="input-pw-keyboard__item">6</div>
                  <div class="input-pw-keyboard__item">7</div>
                  <div class="input-pw-keyboard__item">8</div>
                  <div class="input-pw-keyboard__item">9</div>
                  <div class="input-pw-keyboard__item width-text">
                    <div class="input-account-keyboard__item-back-btn">
                      <span class="input-pw-keyboard__icon-arrow"></span>
                      <div>지우기</div>
                    </div>
                  </div>
                  <div class="input-pw-keyboard__item">0</div>
                  <div class="input-pw-keyboard__item width-text">모두<br>지우기</div>
                </div>
              </div>
            </div>
      
            <div class="main-bottom">
              <div class="main-bottom-buttons">
                <div class="button main-button-secondary">
                  <span class="secondary-btn-img"></span>
                  <span class="secondary-btn-title">취소</span>
                </div>
                <div class="button main-button-primary disabled">
                  <span class="primary-btn-img"></span>
                  <span class="primary-btn-title">확인</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
