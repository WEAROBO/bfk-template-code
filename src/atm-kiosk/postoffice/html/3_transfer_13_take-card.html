<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>3_이체_12_카드(명세표) 회수</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">카드 회수</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">3</span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>            
              <button class="button header__button" aria-label="다시듣기">
                <span class="header__button__icon--play" aria-hidden="true"></span>
                <span class="button__title">다시듣기</span>
              </button>
              <button class="button header__button" aria-label="접근성">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">접근성</span>
              </button>
            </div>
          </div>
        
          <div class="main">
            <div class="receive-box">
              <h1 class="receive-box__title">카드를 받으세요</h1>
              <div class="receive-box__img center">
                <img src="../resources/img/ui/take_card.png" alt="">
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
