<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>5_간편사전접수_5_우편물선택</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button class="button header__button" aria-label="처음으로">
              <span class="header__button--icon header__button--icon-home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>
            <div class="header__buttons">
              <button class="button header__button button-md" aria-label="사운드">
                <span class="header__button--icon header__button--icon-sound" aria-hidden="true"></span>
              </button>
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button--icon header__button--icon-play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="접근성">
                <span class="header__button--icon header__button--icon-help" aria-hidden="true"></span>
                <span class="button__title">접근성</span>
              </button>
              <button class="button header__button header__button--call" aria-label="직원호출">
                <span class="header__button--icon header__button--icon-call" aria-hidden="true"></span>
                <span class="button__title">직원호출</span>
              </button>           
            </div>
          </div>    
          
          <div class="progress-steps progress-steps--four">
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span>1</span></div>
              <div class="progress-step__label">우편물 정보</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>2</span></div>
              <div class="progress-step__label">요금확인</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>3</span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>4</span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <main class="main">  
            <h1 class="main__title main__title--step main__title--small">
              접수할 우편물을 모두 선택하세요.
            </h1>

            <div class="address-list__wrapper">
              <table class="mail-list__table">
                <thead class="mail-list__header">
                  <tr>
                    <th style="width: 10%;">선택</th>
                    <th style="width: 25%;">등록일</th>
                    <th style="width: 25%;">우편종류</th>
                    <th style="width: 20%;">보내는사람</th>
                    <th style="width: 20%;">받는사람</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="mail-list__row mail-list__row--selected">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem1" name="address" class="mail-list__checkbox" checked>
                        <label for="mailItem1" class="mail-list__checkbox-label"></label>
                      </div>                                </td>
                    <td class="mail-list__data">'25. 12. 31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                  <tr class="mail-list__row">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem2" name="address" class="mail-list__checkbox">
                        <label for="mailItem2" class="mail-list__checkbox-label"></label>
                      </div>  
                    </td>
                    <td class="mail-list__data">'25. 12. 31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                  <tr class="mail-list__row">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem3" name="address" class="mail-list__checkbox">
                        <label for="mailItem3" class="mail-list__checkbox-label"></label>
                      </div>  
                    </td>
                    <td class="mail-list__data">'25. 12. 31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                  <tr class="mail-list__row">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem4" name="address" class="mail-list__checkbox">
                        <label for="mailItem4" class="mail-list__checkbox-label"></label>
                      </div>  
                    </td>
                    <td class="mail-list__data">'25. 12. 31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                </tbody>
              </table>
              <div class="pagination">
                <button class="pagination__button" aria-label="이전 페이지"><img src="../resources/img/svg/icon-arrow-up.svg" alt=""></button>
                <span class="pagination__page"><strong>1</strong>/3</span>
                <button class="pagination__button" aria-label="다음 페이지"><img src="../resources/img/svg/icon-arrow-down.svg" alt=""></button>
              </div>
            </div>

            <h2 class="main__title-desc">
              최대 5통까지 접수 가능합니다.
            </h2>          
            
            <div class="main__bottom-buttons">
              <button class="button main__button main-button-secondary" aria-label="이전">
                <span class="main__button__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main-button-primary" aria-label="1통 선택">
                <span class="main__button__icon--next" aria-hidden="true"></span>
                <span class="button__title">1통 선택</span>
              </button>
            </div>
          </main>

        </div>
      </div>
    </div>

  </body>
</html>
