<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>1_우편접수_5-1_부가서비스 설명</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button class="button header__button" aria-label="처음으로">
              <span class="header__button--icon header__button--icon-home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>
            <div class="header__buttons">
              <button class="button header__button button-md" aria-label="사운드">
                <span class="header__button--icon header__button--icon-sound" aria-hidden="true"></span>
              </button>
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button--icon header__button--icon-play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="접근성">
                <span class="header__button--icon header__button--icon-help" aria-hidden="true"></span>
                <span class="button__title">접근성</span>
              </button>
              <button class="button header__button header__button--call" aria-label="직원호출">
                <span class="header__button--icon header__button--icon-call" aria-hidden="true"></span>
                <span class="button__title">직원호출</span>
              </button>           
            </div>
          </div>  
          
          <div class="progress-steps">
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span>1</span></div>
              <div class="progress-step__label">우편물 정보</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>2</span></div>
              <div class="progress-step__label">접수정보</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>3</span></div>
              <div class="progress-step__label">요금확인</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>4</span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>5</span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <main class="main">  
            <h1 class="main__title main__title--step">
              부가 서비스를 선택하세요.
            </h1>

            <ul class="service-list">
              
              <li class="service-list__item">
                <button class="service-card" type="button" data-type="option">
                  <div class="service-card__checkbox">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                  </div>
                  <span class="service-card__label">익일특급</span>
                  <span class="service-card__price">+1,000원</span>
                </button>
                <button class="info-btn" type="button" aria-label="상세 정보">
                  <span class="info-btn-icon"></span>
                </button>
              </li>

              <li class="service-list__item">
                <button class="service-card" type="button" data-type="option">
                  <div class="service-card__checkbox">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                  </div>
                  <span class="service-card__label">배달증명</span>
                  <span class="service-card__price">+1,600원</span>
                </button>
                <button class="info-btn" type="button" aria-label="상세 정보">
                  <span class="info-btn-icon"></span>
                </button>
              </li>

              <li class="service-list__item">
                <button class="service-card" type="button" data-type="option">
                  <div class="service-card__checkbox">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                  </div>
                  <span class="service-card__label">반송불필요</span>
                </button>
                <button class="info-btn" type="button" aria-label="상세 정보">
                  <span class="info-btn-icon"></span>
                </button>
              </li>

              <li class="service-list__item">
                <button class="service-card service-card--active" type="button" data-type="none">
                  <div class="service-card__checkbox">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                  </div>
                  <span class="service-card__label">선택 안함</span>
                </button>
              </li>
            </ul>

            <div class="main__bottom-buttons">
              <button class="button main__button main-button-secondary" aria-label="이전">
                <span class="main__button__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main-button-primary" aria-label="선택 완료">
                <span class="main__button__icon--next" aria-hidden="true"></span>
                <span class="button__title">선택 완료</span>
              </button>              
            </div>
          </main>

        </div>
      </div>
    </div>

    <div class="backdrop">        
      <div class="modal">            
        <h2 class="modal__title">배달증명</h2>
        <div class="modal__body">        
          <div class="modal__description">
            등기우편물을 발송한 후 배달여부 증명서를<br>
            발송인에게 보내는 서비스 입니다.
          </div>
        </div>
        <div class="modal__footer center">         
          <button class="button main__button main-button-secondary" aria-label="닫기">
            <span class="button__title">닫기</span>
          </button>        
        </div>   
      </div>        
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const cards = document.querySelectorAll('.service-card');
        const noneCard = document.querySelector('.service-card[data-type="none"]');

        cards.forEach(card => {
          card.addEventListener('click', function() {
            const isNoneType = this.getAttribute('data-type') === 'none';

            if (isNoneType) {
              // '선택 안함' 클릭 시
              if (this.classList.contains('service-card--active')) return;
              
              this.classList.add('service-card--active');
              
              // 다른 옵션 모두 해제
              cards.forEach(c => {
                if (c !== this) c.classList.remove('service-card--active');
              });
            } else {
              // 일반 옵션 클릭 시
              this.classList.toggle('service-card--active');

              // 옵션이 켜지면 '선택 안함' 해제
              if (this.classList.contains('service-card--active')) {
                noneCard.classList.remove('service-card--active');
              }

              // 모든 옵션이 꺼지면 '선택 안함' 자동 선택
              const anyActive = Array.from(cards).some(c => 
                c.getAttribute('data-type') === 'option' && c.classList.contains('service-card--active')
              );
              
              if (!anyActive) {
                noneCard.classList.add('service-card--active');
              }
            }
          });
        });
      });
    </script>

  </body>
</html>
