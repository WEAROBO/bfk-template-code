<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_우편접수_24_전화번호 입력</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button class="button header__button" aria-label="처음으로">
              <span class="header__button--icon header__button--icon-home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>
            <div class="header__buttons">
              <button class="button header__button button-md" aria-label="사운드">
                <span class="header__button--icon header__button--icon-sound" aria-hidden="true"></span>
              </button>
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button--icon header__button--icon-play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="접근성">
                <span class="header__button--icon header__button--icon-help" aria-hidden="true"></span>
                <span class="button__title">접근성</span>
              </button>
              <button class="button header__button header__button--call" aria-label="직원호출">
                <span class="header__button--icon header__button--icon-call" aria-hidden="true"></span>
                <span class="button__title">직원호출</span>
              </button>           
            </div>
          </div>  
          
          <div class="progress-steps">
            <div class="progress-step progress-step--completed">
              <div class="progress-step__index"><span>1</span></div>
              <div class="progress-step__label">우편물 정보</div>
            </div>
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span>2</span></div>
              <div class="progress-step__label">접수정보</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>3</span></div>
              <div class="progress-step__label">요금확인</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>4</span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>5</span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <main class="main">  
            <h1 class="main__title main__title--step main__title--small">
              휴대폰으로 발송된 6자리 숫자를 입력해주세요 
              <small>(4/4)</small>   
            </h1>          
            <div class="phone-wrap">
              <div class="phone__input-wrap">
                <div class="phone-input__area">
                  <input type="text" id="phoneInput" class="approval-input__field" value="" readonly>
                  <img src="../resources/img/svg/icon_visible-on.svg" id="toggleEye" class="phone-input__toggle" alt="보이기 토글">
                </div>
                <div class="telecom-selector">
                  <div class="policy-box">
                    <label class="policy-box__left">
                      <button type="button" class="policy-box__checkbox" id="policyAgree" aria-pressed="false" aria-label="결제 내용 확인 동의">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                          <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                      </button>
                      <span class="policy-box__text">결제 내용을 확인했습니다</span>
                    </label>
                  </div>                  
                </div>
                <div class="sms-guide">승인번호 입력 후, 상단 동의를 누르셔야 결제가 진행됩니다.</div>
              </div>
              <div class="phone__keyboard-area">
                <button class="phone-keypad__button">1</button>
                <button class="phone-keypad__button">2</button>
                <button class="phone-keypad__button">3</button>
                <button class="phone-keypad__button">4</button>
                <button class="phone-keypad__button">5</button>
                <button class="phone-keypad__button">6</button>
                <button class="phone-keypad__button">7</button>
                <button class="phone-keypad__button">8</button>
                <button class="phone-keypad__button">9</button>
                <button class="phone-keypad__button type2" data-action="delete">
                  <span class="keyboard__button__icon--delete" aria-hidden="true"></span>
                  <span>지우기</span>
                </button>
                <button class="phone-keypad__button">0</button>
                <button class="phone-keypad__button type2" data-action="clear">모두<br>지우기</button>
              </div>
            </div> 
            <div class="main__bottom-buttons">
              <button class="button main__button main-button-secondary" aria-label="이전">
                <span class="main__button__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main-button-primary main-button-disabled" aria-label="다음" disabled>
                <span class="main__button__icon--next" aria-hidden="true"></span>
                <span class="button__title">다음</span>
              </button>
            </div>
          </main>

        </div>
      </div>
    </div>

    <script>
      const input = document.getElementById("phoneInput");
      const buttons = document.querySelectorAll(".phone-keypad__button");
      const toggleEye = document.getElementById("toggleEye");

      let phoneValue = "";
      let isHidden = false;

      function renderCode() {
        if (isHidden) {
          input.value = "•".repeat(phoneValue.length).padEnd(6, "•");
        } else {
          input.value = phoneValue.padEnd(6, "");
        }
      }

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;
          const val = btn.textContent.trim();

          if (action === "delete") {
            phoneValue = phoneValue.slice(0, -1);
          } else if (action === "clear") {
            phoneValue = "";
          } else {
            if (phoneValue.length < 6 && /^[0-9]$/.test(val)) {
              phoneValue += val;
            }
          }

          renderCode();
        });
      });

      toggleEye.addEventListener("click", () => {
        isHidden = !isHidden;

        toggleEye.src = isHidden
          ? "../resources/img/svg/icon_visible-off.svg"
          : "../resources/img/svg/icon_visible-on.svg";

        renderCode();
      });

      renderCode();
    </script>

    <script>
      document
        .querySelectorAll(".policy-box__checkbox")
        .forEach((checkbox) => {
          checkbox.addEventListener("click", (e) => {
            e.stopPropagation();

            const policyBox = checkbox.closest(".policy-box");
            const pressed = checkbox.getAttribute("aria-pressed") === "true";

            checkbox.setAttribute("aria-pressed", String(!pressed));
            checkbox.classList.toggle("is-checked", !pressed);

            if (policyBox) {
              policyBox.classList.toggle("is-selected", !pressed);
            }
          });
        });
    </script>


  </body>
</html>
