<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../resources/css/index.css">
  <title>9_상품 꺼내기</title>
</head>

<body class="lower-screen high-contrast">
  <div class="container-wrap">
    <div class="container">
      <div class="container-before">
        <div class="container-before__title">NIA 한국지능정보사회진흥원</div>
        <div class="container-before__desc">화면 내리기 사용중</div>
        <div class="container-before__guide">상품이 나왔습니다</div>
      </div>
      <div class="container-body">

        <div class="header">
          <div class="header--main">
            <div class="button icon-btn h-80 w-240">
              <div class="icon home-icon"></div>
              <div class="text">처음으로</div>
            </div>
            <div class="header__actions">
              <div class="button btn_language">
              </div>
              <div class="button btn_call_employee">
                <div class="icon"></div>
                <div class="text">직원호출</div>
              </div>
            </div>
          </div>
          <div class="header-sub">
            <div class="progress-steps">
              <div class="progress-step progress-step--completed" aria-current="step">
                <div class="progress-step__index"><span><strong>1</strong></span></div>
                <div class="progress-step__label">상품 선택</div>
              </div>
              <div class="progress-step progress-step--completed">
                <div class="progress-step__index"><span><strong>2</strong></span></div>
                <div class="progress-step__label">결제</div>
              </div>
              <div class="progress-step progress-step--current">
                <div class="progress-step__index"><span><strong>3</strong></span></div>
                <div class="progress-step__label">상품 꺼내기</div>
              </div>
              <div class="progress-step">
                <div class="progress-step__index"><span><strong>4</strong></span></div>
                <div class="progress-step__label">완료</div>
              </div>
            </div>
          </div>
        </div>

        <main class="main">
          <div class="main-inner">
            <div class="title_area">
              <div class="desc">취출구에서 상품을 꺼내주세요.</div>
            </div>

            <div class="main_center">
              <div class="item_out_animation"></div>
              <div class="notice_area">
                <div class="notice_title">
                  <img src="../resources/img/icon/icon_info.png" alt="정보 아이콘" class="notice_icon">
                  주의 사항
                </div>
                <div class="notice_item red">
                  <div class="notice_icon_area center">
                    <div class="notice_icon"></div>
                  </div>
                  <div class="notice_text">문이 닫힐 때 손이 끼일 수 있으니 주의해 주시기 바랍니다.</div>
                </div>
                <div class="notice_item">
                  <div class="notice_icon_area center">
                    <div class="notice_icon"></div>
                  </div>
                  <div class="notice_text">음료 상품 개봉 시 내용물이 튈 수 있으니 주의해 주세요.</div>
                </div>
              </div>
            </div>

        </main>

        <footer class="control-bar control-bar--no-bg">
          <div class="control-bar__buttons">
            <button type="button" class="accessibility__button accessibility__button--high-contrast">
              <span class="accessibility__text">고대비</span>
            </button>
            <button type="button" class="accessibility__button accessibility__button--lower-screen active">
              <span class="accessibility__text">화면 내리기</span>
            </button>
            <button type="button" class="accessibility__button accessibility__button--expand">
              <span class="accessibility__text">화면확대</span>
            </button>
          </div>
          <div class="control-bar__sound">
            <button type="button" class="control-bar__sound-button" aria-label="음량 줄이기">
              <span class="control-bar__sound-icon control-bar__sound-icon--minus" aria-hidden="true"></span>
            </button>
            <div class="control-bar__sound-status">
              <span class="control-bar__sound-icon control-bar__sound-icon--volume" aria-hidden="true"></span>
              <span class="control-bar__sound-level" aria-live="polite">5</span>
            </div>
            <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
              <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
            </button>
          </div>
        </footer>

      </div>
    </div>
  </div>
</body>

</html>
