<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../resources/css/index.css">
  <title>6_편의시설_2_안내소 정보</title>
</head>

<body class="lower-screen">
  <div class="container">
    <div class="container-body">

      <div class="header">
        <div class="header__left">
          <div class="header__logo"></div>
          <div class="weather">
            <div class="weather__icon"></div>
            <div class="weather__temp">23℃</div>
          </div>
        </div>
        <div class="header__right">
          <div class="time__comp">
            <div class="icon-watch"></div>
            <div class="time__hour">01</div>
            <div class="time__divider">:</div>
            <div class="time__min">00</div>
          </div>
          <div class="date">(금) 오후</div>
          <div class="time">12:27</div>
        </div>
      </div>

      <main class="main">

        <img class="main-title__bg_img" src="../resources/img/amenities/eworld_info.png" alt="이월드" />
        <div class="main__title">
          <div class="main-title">이월드 관광안내소</div>
          <div class="main-desc">
            <img src="../resources/img/icon_location.png" alt="위치" />
            대구광역시 달서구 두류공원로 200 (이월드 정문동 우측)
          </div>
        </div>

        <div class="category">
          <div class="category-row">
            <div class="button btn-category btn-img-text active">
              <div class="text">안내소 정보</div>
            </div>
            <div class="button btn-category btn-img-text">
              <div class="text">주요 정보</div>
            </div>
            <div class="button btn-category btn-img-text">
              <div class="text">교통 정보</div>
            </div>
          </div>
        </div>

        <div class="main-divider"></div>

        <div class="introduce-main no-padding">
          <div class="main-introduce pt30 slide_comp ">
            <div class="slide_inner gap20" style="left: 90px;">
              <div class="introduce-img active">
                <img src="../resources/img/amenities/eworld_info.png" alt="정보" />
              </div>
              <div class="amenities-desc">
                이월드 관광안내소는 이월드 정문 우측에 위치하고 있다. 각종 축제의 중심인 두류공원 인근에 위치하고 있어 대구를 찾는 내외국인에게 대구의 관광안내 및 관광정보를 제공하고 있습니다.
              </div>
            </div>
          </div>
        </div>

        <div class="button btn_go_back"></div>
        <div class="button btn_go_home"></div>
      </main>

      <footer class="control-bar">
        <div class="button call-employee btn-img-text">
          <div class="text">직원호출</div>
        </div>
        <div class="footer-divider"></div>
        <div class="button btn-lower-screen btn-img-text">
          <div class="text">낮은화면</div>
        </div>
        <div class="footer-divider"></div>
        <div class="control-bar__sound">
          <button class="button control-bar__sound-button" aria-label="음량 줄이기">
            <span class="control-bar__sound-icon--minus"></span>
          </button>
          <div class="control-bar__sound-status">
            <span class="control-bar__sound-icon--volume" aria-hidden="true"></span>
            <span class="control-bar__sound-level" aria-live="polite">3</span>
          </div>
          <button class="button control-bar__sound-button" aria-label="음량 키우기"><span
              class="control-bar__sound-icon--plus"></span></button>
        </div>
      </footer>

    </div>
  </div>
</body>

</html>
