<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../resources/css/index.css">
  <title>4_숙박_4_교통 정보</title>
</head>

<body class="lower-screen">
  <div class="container">
    <div class="container-body">

      <div class="header">
        <div class="header__left">
          <div class="header__logo"></div>
          <div class="weather">
            <div class="weather__icon"></div>
            <div class="weather__temp">23℃</div>
          </div>
        </div>
        <div class="header__right">
          <div class="time__comp">
            <div class="icon-watch"></div>
            <div class="time__hour">01</div>
            <div class="time__divider">:</div>
            <div class="time__min">00</div>
          </div>
          <div class="date">(금) 오후</div>
          <div class="time">12:27</div>
        </div>
      </div>

      <main class="main">

        <img class="main-title__bg_img" src="../resources/img/hotel/hotel_susung_the_arko.png" alt="이월드" />
        <div class="main__title">
          <div class="main-title">수성 더 아르코 호텔</div>
          <div class="main-desc">
            <img src="../resources/img/icon_location.png" alt="위치" />
            대구광역시 수성구 알파시티1로40길 6
          </div>
        </div>

        <div class="category">
          <div class="category-row">
            <div class="button btn-category btn-img-text">
              <div class="text">소개</div>
            </div>
            <div class="button btn-category btn-img-text">
              <div class="text">주요 정보</div>
            </div>
            <div class="button btn-category btn-img-text active">
              <div class="text">교통 정보</div>
            </div>
          </div>
        </div>

        <div class="main-divider"></div>

        <div class="traffic-main no-padding">
          <div class="traffic-info slide_comp pt30">
            <div class="slide_inner gap20" style="left: 90px;">
              <div class="map-img active">
                <img src="../resources/img/map/map.png" alt="지도" />
                <img class="map-pin" src="../resources/img/map/map-pin.png" alt="지도" />
              </div>
              <div class="public-transportation">
                <div class="public-item">
                  <div class="public-title">지하철</div>
                  <div class="public-list">
                    <div class="public-list__item">
                      <div class="public-type type2">2호선</div>
                      <div class="public-value type2">수성알파시티역</div>
                    </div>
                  </div>
                </div>
                <div class="public-item">
                  <div class="public-title">버스</div>
                  <div class="public-list">
                    <div class="public-list__item">
                      <div class="public-type type5">간선</div>
                      <div class="public-value type5">609</div>
                      <div class="public-value type5">894</div>
                      <div class="public-value type5">949</div>
                    </div>
                    <div class="public-list__item">
                      <div class="public-type type6">지선</div>
                      <div class="public-value type6">수성3</div>
                    </div>
                    <div class="public-list__item">
                      <div class="public-type type8">급행</div>
                      <div class="public-value type8">급행10</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="pagination">
          <div class="pagination-prev">
            <div class="button prev-button disabled"></div>
          </div>
          <div class="pagination__cnt">
            <div class="pagination__current">1</div>
            <div class="pagination__divider">/</div>
            <div class="pagination__total">2</div>
          </div>
          <div class="pagination-next">
            <div class="button next-button"></div>
          </div>
        </div>

        <div class="button btn_go_back"></div>
        <div class="button btn_go_home"></div>
      </main>

      <footer class="control-bar">
        <div class="button call-employee btn-img-text">
          <div class="text">직원호출</div>
        </div>
        <div class="footer-divider"></div>
        <div class="button btn-lower-screen btn-img-text">
          <div class="text">낮은화면</div>
        </div>
        <div class="footer-divider"></div>
        <div class="control-bar__sound">
          <button class="button control-bar__sound-button" aria-label="음량 줄이기">
            <span class="control-bar__sound-icon--minus"></span>
          </button>
          <div class="control-bar__sound-status">
            <span class="control-bar__sound-icon--volume" aria-hidden="true"></span>
            <span class="control-bar__sound-level" aria-live="polite">3</span>
          </div>
          <button class="button control-bar__sound-button" aria-label="음량 키우기"><span
              class="control-bar__sound-icon--plus"></span></button>
        </div>
      </footer>

    </div>
  </div>
</body>

</html>
