<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../resources/css/index.css">
  <title>1_관광명소_1_메인</title>
</head>

<body class="lower-screen">
  <div class="container">
    <div class="container-body">

      <div class="header">
        <div class="header__left">
          <div class="header__logo"></div>
          <div class="weather">
            <div class="weather__icon"></div>
            <div class="weather__temp">23℃</div>
          </div>
        </div>
        <div class="header__right">
          <div class="time__comp">
            <div class="icon-watch"></div>
            <div class="time__hour">01</div>
            <div class="time__divider">:</div>
            <div class="time__min">00</div>
          </div>
          <div class="date">(금) 오후</div>
          <div class="time">12:27</div>
        </div>
      </div>

      <main class="main">

        <div class="main__title">
          <div class="main-title">관광명소</div>
          <div class="main-desc">대구의 다양한 관광명소를 둘러보세요</div>
        </div>

        <div class="category">
          <div class="category-row">
            <div class="button btn-category btn-img-text active">
              <div class="text">전체</div>
            </div>
            <div class="button btn-category btn-img-text">
              <div class="text">문화관광</div>
            </div>
            <div class="button btn-category btn-img-text">
              <div class="text">역사유적</div>
            </div>
          </div>
          <div class="category-row">
            <div class="button btn-category btn-img-text">
              <div class="text">쇼핑/거리</div>
            </div>
            <div class="button btn-category btn-img-text">
              <div class="text">자연/공원</div>
            </div>
            <div class="button btn-category btn-img-text">
              <div class="text">테마/체험</div>
            </div>
          </div>
        </div>

        <div class="main-divider"></div>

        <div class="sub-category">
          <div class="main__grid">
            <div class="button sub-category__button">
              <img class="button-icon" src="../resources/img/category/biseulsan.png" alt="비슬산" />
              <div class="button--name">비슬산</div>
            </div>
            <div class="button sub-category__button">
              <img class="button-icon" src="../resources/img/category/sumokwon.jpg" alt="대구 수목원" />
              <div class="button--name">대구 수목원</div>
            </div>
            <div class="button sub-category__button">
              <img class="button-icon" src="../resources/img/category/susungmok.png" alt="수성못" />
              <div class="button--name">수성못</div>
            </div>
            <div class="button sub-category__button">
              <img class="button-icon" src="../resources/img/category/seomoonsijang.png" alt="서문시장" />
              <div class="button--name">서문시장</div>
            </div>
            <div class="button sub-category__button">
              <img class="button-icon" src="../resources/img/category/gamyoung.jpg" alt="경상감영공원" />
              <div class="button--name">경상감영공원</div>
            </div>
            <div class="button sub-category__button">
              <img class="button-icon" src="../resources/img/category/eworld.jpg" alt="이월드" />
              <div class="button--name">이월드</div>
            </div>
            <div class="button sub-category__button">
              <img class="button-icon" src="../resources/img/category/museum.jpg" alt="국립대구박물관" />
              <div class="button--name">국립대구박물관</div>
            </div>
            <div class="button sub-category__button">
              <img class="button-icon" src="../resources/img/category/exco.jpg" alt="엑스코EXCO" />
              <div class="button--name">엑스코EXCO</div>
            </div>
          </div>
        </div>

        <div class="pagination">
          <div class="pagination-prev">
            <div class="button prev-button disabled"></div>
          </div>
          <div class="pagination__cnt">
            <div class="pagination__current">1</div>
            <div class="pagination__divider">/</div>
            <div class="pagination__total">10</div>
          </div>
          <div class="pagination-next">
            <div class="button next-button"></div>
          </div>

        </div>

        <div class="button btn_go_back"></div>
      </main>

      <footer class="control-bar">
        <div class="button call-employee btn-img-text">
          <div class="text">직원호출</div>
        </div>
        <div class="footer-divider"></div>
        <div class="button btn-lower-screen btn-img-text active">
          <div class="text">낮은화면</div>
        </div>
        <div class="footer-divider"></div>
        <div class="control-bar__sound">
          <button class="button control-bar__sound-button" aria-label="음량 줄이기">
            <span class="control-bar__sound-icon--minus"></span>
          </button>
          <div class="control-bar__sound-status">
            <span class="control-bar__sound-icon--volume" aria-hidden="true"></span>
            <span class="control-bar__sound-level" aria-live="polite">3</span>
          </div>
          <button class="button control-bar__sound-button" aria-label="음량 키우기"><span
              class="control-bar__sound-icon--plus"></span></button>
        </div>
      </footer>

    </div>
  </div>
</body>

</html>
