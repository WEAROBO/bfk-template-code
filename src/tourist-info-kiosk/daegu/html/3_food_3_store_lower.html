<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../resources/css/index.css">
  <title>3_음식_3_먹거리골목</title>
</head>

<body class="lower-screen">
  <div class="container">
    <div class="container-body">

      <div class="header">
        <div class="header__left">
          <div class="header__logo"></div>
          <div class="weather">
            <div class="weather__icon"></div>
            <div class="weather__temp">23℃</div>
          </div>
        </div>
        <div class="header__right">
          <div class="time__comp">
            <div class="icon-watch"></div>
            <div class="time__hour">01</div>
            <div class="time__divider">:</div>
            <div class="time__min">00</div>
          </div>
          <div class="date">(금) 오후</div>
          <div class="time">12:27</div>
        </div>
      </div>

      <main class="main">

        <div class="main__title">
          <div class="main-title">음식</div>
          <div class="main-desc">대구에 와야 그 참맛을 느낄 수 있는 본고장 향토음식</div>
        </div>

        <div class="category">
          <div class="category-row">
            <div class="button btn-category2 btn-img-text">
              <div class="text">대구 10미</div>
            </div>
            <div class="button btn-category2 btn-img-text active">
              <div class="text">대구 먹거리골목</div>
            </div>
          </div>
        </div>

        <div class="main-divider"></div>

        <div class="category-slide-area">
          <div class="category-slide">
            <div class="category-slide-prev">
              <div class="button prev-button disabled"></div>
            </div>
            <div class="category-slide__list">
              <div class="category-slide__item">전체</div>
              <div class="category-slide__item active">동구</div>
              <div class="category-slide__item">서구</div>
              <div class="category-slide__item">남구</div>
              <div class="category-slide__item">북구</div>
            </div>
            <div class="category-slide-next">
              <div class="button next-button"></div>
            </div>
          </div>
        </div>

        <div class="theme-main">
          <div class="theme-main-inner">
            <div class="theme-item">
              <img class="theme-icon" src="../resources/img/store/bossam.png" alt="보쌈" />
              <div class="theme-info">
                <div class="theme-title">남산동보쌈골목</div>
                <div class="theme-desc">이른 새벽부터 허기진 배 <br />
                  달래주는 돼지국밥과 보쌈</div>
              </div>
              <div class="theme-next position-center">
                <img src="../resources/img/icon_arrow-right.png" alt="자세히" />
              </div>
            </div>
            <div class="theme-item">
              <img class="theme-icon" src="../resources/img/store/galbi.png" alt="갈비" />
              <div class="theme-info">
                <div class="theme-title">동인동찜갈비골목</div>
                <div class="theme-desc">대차게 맵고, 화끈한 대구의 맛!</div>
              </div>
              <div class="theme-next position-center">
                <img src="../resources/img/icon_arrow-right.png" alt="자세히" />
              </div>
            </div>
          </div>
        </div>

        <div class="pagination">
          <div class="pagination-prev">
            <div class="button prev-button disabled"></div>
          </div>
          <div class="pagination__cnt">
            <div class="pagination__current">1</div>
            <div class="pagination__divider">/</div>
            <div class="pagination__total">4</div>
          </div>
          <div class="pagination-next">
            <div class="button next-button"></div>
          </div>

        </div>

        <div class="button btn_go_back"></div>
        <div class="button btn_go_home"></div>
      </main>

      <footer class="control-bar">
        <div class="button call-employee btn-img-text">
          <div class="text">직원호출</div>
        </div>
        <div class="footer-divider"></div>
        <div class="button btn-lower-screen btn-img-text active">
          <div class="text">낮은화면</div>
        </div>
        <div class="footer-divider"></div>
        <div class="control-bar__sound">
          <button class="button control-bar__sound-button" aria-label="음량 줄이기">
            <span class="control-bar__sound-icon--minus"></span>
          </button>
          <div class="control-bar__sound-status">
            <span class="control-bar__sound-icon--volume" aria-hidden="true"></span>
            <span class="control-bar__sound-level" aria-live="polite">3</span>
          </div>
          <button class="button control-bar__sound-button" aria-label="음량 키우기"><span
              class="control-bar__sound-icon--plus"></span></button>
        </div>
      </footer>

    </div>
  </div>
</body>

</html>
