<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>3_국제우편_2_주의사항</title>
  </head>
  <body class="high-contrast">
    <div class="container-wrap">    
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button class="button header__button" aria-label="처음으로">
              <span class="header__button__icon--home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>
            <div class="header__buttons">
              <div class="header__button--text" aria-label="문의 1600-0000">
                <span class="header__button__icon--call-bk" aria-hidden="true"></span>
                <span class="button__title">문의 1600-0000</span>
              </div>
            </div>
          </div>
          
          <main class="main">  
            
            <h1 class="main__title main__title--guide"><span class="main__title--alert-icon" role="img" aria-label="주의 아이콘"></span>주의사항</h1>
            <div class="info-box mt-80">
              <ul class="info-list">
                <li>국제우편은 종적조회 및 배송확인이 되지 않습니다.</li>
                <li>종적조회 및 배송확인 서비스가 필요한 경우, 우체국에서 EMS로 접수하시기 바랍니다.</li>
                <li>국제우편만 접수가 가능하며, 국제소포 접수는 창구를 이용해주시기 바랍니다.</li>
              </ul>
            </div>

            <div class="main__bottom-buttons">
              <button class="button main__button main-button-secondary" aria-label="이전 단계로 이동">
                <span class="main__button__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main-button-primary" aria-label="작성완료">
                <span class="main__button__icon--next" aria-hidden="true"></span>
                <span class="button__title">작성완료</span>
              </button>
            </div>
          </main>

          <footer class="control-bar control-bar--no-bg">
            <div class="control-bar__buttons">
              <button class="button accessibility__button accessibility-high-contrast">
                <span class="button__title">고대비</span>
              </button>
              <button class="button accessibility__button accessibility-lower-screen">
                <span class="button__title">낮은화면</span>
              </button>
              <button class="button accessibility__button accessibility-full-screen">
                <span class="button__title">화면확대</span>
              </button>
            </div>
            <div class="control-bar__sound">
              <button class="button control-bar__sound-button" aria-label="음량 줄이기"><span class="control-bar__sound-icon--minus"></span></button>
              <div class="control-bar__sound-status">
                <span class="control-bar__sound-icon--volume" aria-hidden="true"></span>
                <span class="control-bar__sound-level" aria-live="polite">3</span>
              </div>
              <button class="button control-bar__sound-button" aria-label="음량 키우기"><span class="control-bar__sound-icon--plus"></span></button>
            </div>
          </footer>

        </div>
      </div>
    </div>
  </body>
</html>
