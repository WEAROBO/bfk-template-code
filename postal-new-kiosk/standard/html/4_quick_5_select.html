<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../resources/css/index.css">
    <title>4_간편사전접수_5_우편물선택</title>

  <body>
    <div class="container-wrap">    
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button class="button header__button" aria-label="처음으로">
              <span class="header__button__icon--home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>
            <div class="header__buttons">
              <div class="header__button--text" aria-label="문의 1600-0000">
                <span class="header__button__icon--call-bk" aria-hidden="true"></span>
                <span class="button__title">문의 1600-0000</span>
              </div>
            </div>
          </div>
          
          <div class="progress-steps progress-steps--four">
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span>1</span></div>
              <div class="progress-step__label">우편물 정보</div>
            </div>
            <div class="progress-step">

            </div>
            <div class="progress-step">

            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>4</span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <main class="main">  
            <h1 class="main__title main__title--step">

            <div class="address-list__wrapper">
              <table class="mail-list__table">
                <thead class="mail-list__header">
                  <tr>
                    <th style="width: 100px;"><span class="sr-only">선택</span></th>
                    <th style="width: 24%;">등록일</th>
                    <th style="width: 20%;">우편종류</th>
                    <th style="width: 23%;">보내는사람</th>
                    <th style="width: 23%;">받는사람</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="mail-list__row mail-list__row--selected">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem1" class="mail-list__checkbox" checked>
                        <label for="mailItem1" class="mail-list__checkbox-label"></label>
                      </div>
                    </td>
                    <td class="mail-list__data">'25.12.31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                  <tr class="mail-list__row">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem2" class="mail-list__checkbox">
                        <label for="mailItem2" class="mail-list__checkbox-label"></label>
                      </div>
                    </td>
                    <td class="mail-list__data">'25.12.31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                  <tr class="mail-list__row">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem3" class="mail-list__checkbox">
                        <label for="mailItem3" class="mail-list__checkbox-label"></label>
                      </div>
                    </td>
                    <td class="mail-list__data">'25.12.31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                  <tr class="mail-list__row">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem4" class="mail-list__checkbox">
                        <label for="mailItem4" class="mail-list__checkbox-label"></label>
                      </div>
                    </td>
                    <td class="mail-list__data">'25.12.31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                  <tr class="mail-list__row">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem5" class="mail-list__checkbox">
                        <label for="mailItem5" class="mail-list__checkbox-label"></label>
                      </div>
                    </td>
                    <td class="mail-list__data">'25.12.31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                  <tr class="mail-list__row">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem3" class="mail-list__checkbox">
                        <label for="mailItem3" class="mail-list__checkbox-label"></label>
                      </div>
                    </td>
                    <td class="mail-list__data">'25.12.31</td>
                    <td class="mail-list__data">익일특급</td>
                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>
                  <tr class="mail-list__row">
                    <td class="mail-list__data">
                      <div class="mail-list__checkbox-wrap">
                        <input type="checkbox" id="mailItem4" class="mail-list__checkbox">

                      </div>
                    </td>

                    <td class="mail-list__data">김철수</td>
                    <td class="mail-list__data">김영희</td>
                  </tr>           
                </tbody>
              </table>

              <div class="pagination">
                <button class="pagination__button" aria-label="이전 페이지" disabled>
                  <span class="pagination-icon-arrow-up"></span>
                </button>
                <span class="pagination__page"><strong>1</strong>/3</span>
                <button class="pagination__button" aria-label="다음 페이지">
                  <span class="pagination-icon-arrow-down"></span>
                </button>
              </div>
            </div>

            <div class="main__bottom-buttons">
              <button class="button main__button main-button-secondary">
                <span class="main__button__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main-button-primary">
                <span class="main__button__icon--next" aria-hidden="true"></span>
                <span class="button__title">선택</span>
              </button>
            </div>
          </main>

          <footer class="control-bar control-bar--no-bg">
            <div class="control-bar__buttons">
              <button class="button accessibility__button accessibility-high-contrast">
                <span class="button__title">고대비</span>
              </button>
              <button class="button accessibility__button accessibility-lower-screen">
                <span class="button__title">낮은화면</span>
              </button>
              <button class="button accessibility__button accessibility-full-screen">

              </button>
            </div>
            <div class="control-bar__sound">
              <button class="button control-bar__sound-button" aria-label="음량 줄이기">
                <span class="control-bar__sound-icon--minus"></span>
              </button>
              <div class="control-bar__sound-status">
                <span class="control-bar__sound-icon--volume" aria-hidden="true"></span>
                <span class="control-bar__sound-level">3</span>
              </div>
              <button class="button control-bar__sound-button" aria-label="음량 키우기">
                <span class="control-bar__sound-icon--plus"></span>
              </button>
            </div>
          </footer>

        </div>
      </div>
    </div>

    <script>
      const rows = document.querySelectorAll(".mail-list__row");

      rows.forEach(row => {
        const checkbox = row.querySelector(".mail-list__checkbox");

        row.addEventListener("click", e => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "LABEL") {
            return;
          }
          checkbox.checked = !checkbox.checked;
          row.classList.toggle("mail-list__row--selected", checkbox.checked);
        });

        checkbox.addEventListener("change", () => {
          row.classList.toggle("mail-list__row--selected", checkbox.checked);
        });
      });
    </script>

  </body>
</html>
