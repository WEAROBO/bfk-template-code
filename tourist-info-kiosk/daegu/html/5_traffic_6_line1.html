<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../resources/css/index.css">
  <title>5_주변 교통_6_1호선</title>
</head>

<body class="">
  <div class="container">
    <div class="container-body">

      <div class="header">
        <div class="header__left">
          <div class="header__logo"></div>
          <div class="weather">
            <div class="weather__icon"></div>
            <div class="weather__temp">23℃</div>
          </div>
        </div>
        <div class="header__right">
          <div class="time__comp">
            <div class="icon-watch"></div>
            <div class="time__hour">01</div>
            <div class="time__divider">:</div>
            <div class="time__min">00</div>
          </div>
          <div class="date">(금) 오후</div>
          <div class="time">12:27</div>
        </div>
      </div>

      <main class="main">

        <div class="main__title">
          <div class="main-title">주변 교통</div>
          <div class="main-desc">
            도시철도, 기차, 공항까지 연결된 교통의 요충지
          </div>
        </div>

        <div class="category">
          <div class="category-row">
            <div class="button btn-category2 btn-img-text">
              <div class="text">주변 교통</div>
            </div>
            <div class="button btn-category2 btn-img-text active">
              <div class="text">도시철도</div>
            </div>
          </div>
        </div>

        <div class="main-divider"></div>

        <div class="trafic-main">
          <div class="category-slide">
            <div class="category-slide__list">
              <div class="category-slide__item all">전체</div>
              <div class="category-slide__item type1 active">1호선</div>
              <div class="category-slide__item type2">2호선</div>
              <div class="category-slide__item type3">3호선</div>
              <div class="category-slide__item type4">대경선</div>
            </div>
          </div>
          <div class="subway-bg-img">
            <img src="../resources/img/traffic/subway_bg_line1.png" alt="지하철" />

            <div class="control-box__area">
              <div class="control-box">
                <div class="control__direction">
                  <div class="button control-btn top"></div>
                  <div class="button control-btn right"></div>
                  <div class="button control-btn bottom"></div>
                  <div class="button control-btn left"></div>
                </div>
                <div class="control__zoom">
                  <div class="button zoom_btn minus disabled"></div>
                  <div class="zoom_value">×1</div>
                  <div class="button zoom_btn plus"></div>
                </div>
                <div class="button control__button">확대끄기</div>
              </div>
            </div>

          </div>

          <div class="position_desc">
            <div class="mark"></div>
            현재 위치에서 가장 가까운 역 위주로 표기합니다.
          </div>

          <div class="button btn_go_back"></div>
          <div class="button btn_station_info">
            <div class="icon"></div>
            도시 철도 시설 정보
          </div>
      </main>

      <footer class="control-bar">
        <div class="button call-employee btn-img-text">
          <div class="text">직원호출</div>
        </div>
        <div class="footer-divider"></div>
        <div class="button btn-lower-screen btn-img-text">
          <div class="text">낮은화면</div>
        </div>
        <div class="footer-divider"></div>
        <div class="control-bar__sound">
          <button class="button control-bar__sound-button" aria-label="음량 줄이기">
            <span class="control-bar__sound-icon--minus"></span>
          </button>
          <div class="control-bar__sound-status">
            <span class="control-bar__sound-icon--volume" aria-hidden="true"></span>
            <span class="control-bar__sound-level" aria-live="polite">3</span>
          </div>
          <button class="button control-bar__sound-button" aria-label="음량 키우기"><span
              class="control-bar__sound-icon--plus"></span></button>
        </div>
      </footer>

    </div>
  </div>
</body>

</html>
