<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../resources/css/index.css">
  <title>1_관광명소_4_편의 정보</title>
</head>

<body class="">
  <div class="container">
    <div class="container-body">

      <div class="header">
        <div class="header__left">
          <div class="header__logo"></div>
          <div class="weather">
            <div class="weather__icon"></div>
            <div class="weather__temp">23℃</div>
          </div>
        </div>
        <div class="header__right">
          <div class="time__comp">
            <div class="icon-watch"></div>
            <div class="time__hour">01</div>
            <div class="time__divider">:</div>
            <div class="time__min">00</div>
          </div>
          <div class="date">(금) 오후</div>
          <div class="time">12:27</div>
        </div>
      </div>

      <main class="main">
        <img class="main-title__bg_img" src="../resources/img/category/eworld.jpg" alt="이월드" />
        <div class="main__title">
          <div class="main-title">이월드</div>
          <div class="main-desc">
            <img src="../resources/img/icon_location.png" alt="위치" />
            대구광역시 달서구 두류공원로 200 (두류동)
          </div>
        </div>

        <div class="category">
          <div class="category-row">
            <div class="button btn-category2 btn-img-text">
              <div class="text">소개</div>
            </div>
            <div class="button btn-category2 btn-img-text">
              <div class="text">주요 정보</div>
            </div>
          </div>
          <div class="category-row">
            <div class="button btn-category2 btn-img-text active">
              <img src="../resources/img/icon_wheelchair.png" alt="위치" />
              <div class="text">편의 정보</div>
            </div>
            <div class="button btn-category2 btn-img-text">
              <div class="text">교통 정보</div>
            </div>
          </div>
        </div>

        <div class="main-divider"></div>

        <div class="service-category">
          <div class="category-row">
            <div class="button btn-category btn-img-text active">
              <div class="text">지체장애</div>
            </div>
            <div class="button btn-category btn-img-text">
              <div class="text">영유아가족</div>
            </div>
            <div class="button btn-category btn-img-text">
              <div class="text">고령자</div>
            </div>
          </div>
        </div>

        <div class="introduce-info-main" style="padding-top: unset;">
          <div class="main-info">
            <div class="info-item">
              <div class="info-title">주차여부</div>
              <div class="info-desc">장애인 주차장 있음_무장애 편의시설</div>
            </div>
            <div class="info-item">
              <div class="info-title">주 출입 접근로</div>
              <div class="info-desc">출입구까지 턱이 없어 휠체어 접근 가능함</div>
            </div>
            <div class="info-item">
              <div class="info-title">휠체어대여</div>
              <div class="info-desc">대여가능(신분증 지참)</div>
            </div>
            <div class="info-item">
              <div class="info-title">출입통로</div>
              <div class="info-desc">주출입구는 턱이 없어 휠체어 접근 가능함</div>
            </div>
            <div class="info-item">
              <div class="info-title">엘리베이터</div>
              <div class="info-desc">엘리베이터 있음</div>
            </div>
            <div class="info-item">
              <div class="info-title">화장실</div>
              <div class="info-desc">장애인 화장실 있음</div>
            </div>
            <div class="info-item">
              <div class="info-title">지체장애 기타 상세</div>
              <div class="info-desc">식당에 의자식 테이블 있음</div>
            </div>
          </div>
        </div>

        <div class="button btn_go_back"></div>
        <div class="button btn_go_home"></div>
      </main>

      <footer class="control-bar">
        <div class="button call-employee btn-img-text">
          <div class="text">직원호출</div>
        </div>
        <div class="footer-divider"></div>
        <div class="button btn-lower-screen btn-img-text">
          <div class="text">낮은화면</div>
        </div>
        <div class="footer-divider"></div>
        <div class="control-bar__sound">
          <button class="button control-bar__sound-button" aria-label="음량 줄이기">
            <span class="control-bar__sound-icon--minus"></span>
          </button>
          <div class="control-bar__sound-status">
            <span class="control-bar__sound-icon--volume" aria-hidden="true"></span>
            <span class="control-bar__sound-level" aria-live="polite">3</span>
          </div>
          <button class="button control-bar__sound-button" aria-label="음량 키우기"><span
              class="control-bar__sound-icon--plus"></span></button>
        </div>
      </footer>

    </div>
  </div>
</body>

</html>
