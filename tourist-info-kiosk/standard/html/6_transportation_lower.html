<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../resources/css/index.css">
  <title>6_교통</title>
</head>

<body class="lower-screen">
  <div class="container-wrap">
    <div class="container">
      <div class="container-before">
        <div class="container-before__title">NIA 한국지능정보사회진흥원</div>
        <div class="container-before__desc">화면 내리기 사용중</div>
        <div class="container-before__guide">교통</div>
      </div>
      <div class="container-body">

        <div class="header">
          <div class="header--main">
            <div class="button icon-btn h-60 w-200">
              <div class="icon home-icon"></div>
              <div class="text">처음으로</div>
            </div>
            <div class="header__actions">
              <div class="weather_comp center">
                <div class="date">
                  <div class="month">12월</div>
                  <div class="day">31일</div>
                  <div class="day_of_week">(수)</div>
                  <div class="time">18:27</div>
                </div>
                <div class="weather">
                  <div class="weather_icon"></div>
                  <div class="temp">23</div>
                  <div class="unit">°C</div>
                </div>
              </div>
              <div class="button btn_language">
              </div>
              <div class="button btn_call_employee">
                <div class="icon"></div>
                <div class="text">직원호출</div>
              </div>
            </div>
          </div>
        </div>

        <main class="main">
          <div class="main-inner">

            <div class="transportation_detail">
              <div class="bg_area">
                <div class="bg_img"></div>
              </div>
              <div class="button_area">
                <div class="button">이용시간 및 요금</div>
                <div class="control_box_area">
                  <div class="control_box">
                    <div class="t_area">
                      <div class="contbtn top">
                        <div class="icon"></div>
                      </div>
                      <div class="contbtn right">
                        <div class="icon"></div>
                      </div>
                      <div class="contbtn left">
                        <div class="icon"></div>
                      </div>
                      <div class="contbtn bottom">
                        <div class="icon"></div>
                      </div>
                    </div>
                    <div class="b_area">
                      <div class="control_b_button_area">
                        <button type="button" class="control-bar__sound-button" aria-label="음량 줄이기">
                          <span class="control-bar__sound-icon control-bar__sound-icon--minus"
                            aria-hidden="true"></span>
                        </button>
                        <div class="control-bar__sound-status status">
                          <span class="compex" aria-hidden="true">x</span>
                          <span class="level" aria-live="polite">5</span>
                        </div>
                        <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
                          <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>

        <div class="menu_area">
          <div class=menu_comp>
            <div class="button menu-button">
              <div class="menu_icon">
                <div class="icon travel"></div>
              </div>
              <div class="menu_name">여행지</div>
            </div>
            <div class="divider_area">
              <div class="divider"></div>
            </div>
            <div class="button menu-button">
              <div class="menu_icon">
                <div class="icon food"></div>
              </div>
              <div class="menu_name">음식점</div>
            </div>
            <div class="divider_area">
              <div class="divider"></div>
            </div>
            <div class="button menu-button">
              <div class="menu_icon">
                <div class="icon festival"></div>
              </div>
              <div class="menu_name">축제 & 행사</div>
            </div>
            <div class="divider_area">
              <div class="divider"></div>
            </div>
            <div class="button menu-button">
              <div class="menu_icon">
                <div class="icon theme"></div>
              </div>
              <div class="menu_name">테마 코스</div>
            </div>
            <div class="divider_area">
              <div class="divider"></div>
            </div>
            <div class="button menu-button active">
              <div class="menu_icon">
                <div class="icon transportation"></div>
              </div>
              <div class="menu_name">교통</div>
            </div>
            <div class="divider_area">
              <div class="divider"></div>
            </div>
            <div class="button menu-button information">
              <div class="menu_icon">
                <div class="icon information"></div>
              </div>
              <div class="menu_name">안내 정보</div>
            </div>
          </div>
        </div>
        <footer class="control-bar control-bar--no-bg">
          <div class="control-bar__buttons">
            <div class="button flag_btn">
              <div class="icon"></div>
            </div>
            <button type="button" class="accessibility__button accessibility__button--high-contrast">
              <span class="accessibility__text">고대비</span>
            </button>
            <button type="button" class="accessibility__button accessibility__button--lower-screen active">
              <span class="accessibility__text">화면 내리기</span>
            </button>
            <button type="button" class="accessibility__button accessibility__button--expand">
              <span class="accessibility__text">화면확대</span>
            </button>
          </div>
          <div class="control-bar__sound">
            <button type="button" class="control-bar__sound-button" aria-label="음량 줄이기">
              <span class="control-bar__sound-icon control-bar__sound-icon--minus" aria-hidden="true"></span>
            </button>
            <div class="control-bar__sound-status">
              <span class="control-bar__sound-icon control-bar__sound-icon--volume" aria-hidden="true"></span>
              <span class="control-bar__sound-level" aria-live="polite">5</span>
            </div>
            <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
              <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
            </button>
          </div>
        </footer>

      </div>
    </div>
  </div>
</body>

</html>
