<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>5_레이아웃_6_시간 연장</title>
  </head>
  <body>
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">
        </div>
      </div>
    </div>

    <div class="backdrop">        
      <div class="modal">            
        <div class="modal__body">
          <div class="modal__timer-question">시간을 연장하시겠습니까?</div>        
          <div class="modal__timer">
            <span class="modal__timer-icon" aria-hidden="true"></span>
            <div class="modal__timer-time">
              <span class="modal__timer-countdown">20</span>초
            </div>
          </div>
          <div class="modal__timer-message">처음으로 이동합니다.</div>
        </div>
        <div class="modal__footer center">         
          <button class="button modal__button modal__button-secondary" aria-label="처음으로">
            <span class="button__title">처음으로</span>
          </button>
          <button class="button modal__button modal__button-primary" aria-label="시간연장">
            <span class="button__title">시간연장</span>
          </button>      
        </div>   
      </div>        
    </div>

  </body>
</html>
