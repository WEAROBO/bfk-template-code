<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>1_출금_7_비밀번호 입력</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

     
          <div class="header">
            <div class="header__title">비밀번호 입력</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">100<small>%</small></small></span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>            
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button__icon--play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="도움기능">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">도움기능</span>
              </button>
            </div>
          </div>
        
          <div class="main pt-30">
            <div class="input-pw">
              <div class="input-pw-box box-style">
                <div class="input-pw-box-top box-top">
                  <h1 class="box-top-title">비밀번호를 입력하시고<br/>
                    <span class="fc-blue">확인</span>을 누르세요
                  </h1>
                  <div class="box-top-middle">
                    <div class="input-pw-box__input mt-40 mb-14">
                      <div class="input-pw-box__input-inner"
                        id="input-pw-box__input-inner">
                        <div class="star">*</div>
                        <div class="star">*</div>
                        <div class="star">*</div>
                        <div class="star">*</div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="box-bottom">
                  <div class="input-pw-box__desc box-bottom_desc">비밀번호 입력 시 손이나 소지품으로 <br/> 
                    가리고 입력해 주세요</div>
                </div>
              </div>
              <div class="input-pw-keyboard center">
                <div class="input-pw-keyboard--grid">
                  <div class="input-pw-keyboard__item" onclick="keyclick('1')">1</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('2')">2</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('3')">3</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('4')">4</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('5')">5</div>
                  <div class="input-pw-keyboard__item">
                    <img src="../resources/img/ui/nia_btn.png" alt="NIA">
                  </div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('6')">6</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('7')">7</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('8')">8</div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('9')">9</div>
                  <div class="input-pw-keyboard__item">
                    <img src="../resources/img/ui/nia_btn.png" alt="NIA">
                  </div>
                  <div class="input-pw-keyboard__item" onclick="keyclick('0')">0</div>
                  <div class="input-pw-keyboard__item large" onclick="keyclick('remeshing')">재배열</div>
                  <div class="input-pw-keyboard__item width-text" onclick="keyclick('delete')">
                    <div class="input-pw-keyboard__item-back-btn">
                      <span class="input-pw-keyboard__icon-arrow"></span>
                      <div>지우기</div>
                    </div>
                  </div>
                  <div class="input-pw-keyboard__item width-text" onclick="keyclick('delete_all')">모두<br/>지우기</div>
                </div>
              </div>
            </div>
    
            <div class="main-bottom mt-30">
              <div class="main-bottom-buttons">
                <div class="button main-button-secondary">
                  <span class="secondary-btn-img"></span>
                  <span class="secondary-btn-title">취소</span>
                </div>
                <div class="button main-button-primary">
                  <span class="primary-btn-img"></span>
                  <span class="primary-btn-title">확인</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

<script>
  let password = ""
  function keyclick(value) {
    console.log("keyclick", value)
    if (value == "delete_all") {
      password = ""
    } else if (value == "delete") {
      if (password.length > 0) {
        password = password.slice(0, password.length - 1);
      }

    } else if (password.length < 4) {
      password += value
    }
    console.log("password", password)
    const input_layer = document.querySelector("#input-pw-box__input-inner")
    input_layer.innerHTML = ''
    for (let i = 0; i < password.length; i++) {
// <div class="star">*</div>
      let div = document.createElement('div');
      div.innerHTML = '*';
      div.classList.add('star');
      input_layer.appendChild(div)
    }

  }
</script>
  </body>
</html>
