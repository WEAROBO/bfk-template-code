<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>5_레이아웃_5_일반대출 간편신청</title>
  </head>
  <body class="high-contrast">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">일반대출 간편신청</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">100<small>%</small></small></span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>            
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button__icon--play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="도움기능">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">도움기능</span>
              </button>
            </div>
          </div>
        
          <div class="main pt-30">            
            <div class="agreement-content__box">
              <h1 class="agreement-content__title">일반대출 간편신청 안내</h1>
              <div class="agreement-content">
                <div class="agreement-content__wrapper">
                  <div class="agreement-content__pages" id="pagesContainer">                    
                    <div class="agreement-content__page" data-page-index="1">
                      <ul class="agreement-content__list">
                        <li class="agreement-content__item" data-list-num="1">
                          입력한 전화번호로 문자가 전송됩니다.
                        </li>
                        <li class="agreement-content__item" data-list-num="2">
                          문자로 수신된 주소를 접속하여 본인인증 및 대출한도를 조회가 가능합니다.
                        </li>
                        <li class="agreement-content__item" data-list-num="3">
                          직접신청 또는 상담원 통화로 대출신청이 가능합니다.
                        </li>
                        <li class="agreement-content__item" data-list-num="4">
                          NIA카드를 소지한 고객은 장기카드대출을 이용하시기 바랍니다.
                        </li>
                      </ul>
                    </div>                
                    <div class="agreement-content__page" data-page-index="2">
                      <ul class="agreement-content__list">
                        <li class="agreement-content__item" data-list-num="5">
                          문자로 수신된 주소를 접속하여 본인인증 및 대출한도를 조회가 가능합니다.
                        </li>
                        <li class="agreement-content__item" data-list-num="6">
                          직접신청 또는 상담원 통화로 대출신청이 가능합니다.
                        </li>                        
                      </ul>
                    </div>                    
                  </div>
                </div>                
                <div class="pagination-controller">                
                  <button class="pagination-controller__button arrow-up" id="prevBtn" disabled aria-label="이전 페이지">
                    <img src="../resources/img/svg/icon-arrow-up.svg" alt="">
                  </button>                
                  <div class="pagination-controller__info">
                    <strong class="fc-blue" id="currentPage">1</strong>/<span id="totalPages">3</span>
                  </div>                
                  <button class="pagination-controller__button arrow-down" id="nextBtn" aria-label="다음 페이지">
                    <img src="../resources/img/svg/icon-arrow-down.svg" alt="">
                  </button>
                </div>
              </div>
            </div>
    
            <div class="main-bottom mt-16">
              <div class="main-bottom-buttons center">
                <div class="button main-button-primary">
                  <span class="primary-btn-title">닫기</span>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

<script>
      const pages = document.querySelectorAll('.agreement-content__page');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const currentPageSpan = document.getElementById('currentPage');
      
      const totalPages = pages.length;
      let currentPage = 1;

      document.getElementById('totalPages').textContent = totalPages;

      function goToPage(pageNumber) {
        if (pageNumber < 1 || pageNumber > totalPages) {
          return;
        }

        const activePage = document.querySelector('.agreement-content__page--active');
        if (activePage) {
          activePage.classList.remove('agreement-content__page--active');
        }

        currentPage = pageNumber;
        
        const nextPage = document.querySelector(`[data-page-index="${currentPage}"]`);
        if (nextPage) {
          nextPage.classList.add('agreement-content__page--active');
        }

        currentPageSpan.textContent = currentPage;

        updateButtonState();
      }

      function updateButtonState() {
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
        
      }

      prevBtn.addEventListener('click', () => {
        goToPage(currentPage - 1);
      });

      nextBtn.addEventListener('click', () => {
        goToPage(currentPage + 1);
      });
      
      window.onload = () => {
        goToPage(1);
      };
    </script>
  </body>
</html>
