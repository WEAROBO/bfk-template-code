<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_입금_7_현금 투입</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">현금 투입</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">100<small>%</small></small></span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>            
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button__icon--play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="도움기능">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">도움기능</span>
              </button>
            </div>
          </div>
        
          <div class="main pt-30">
            <div class="card-input main-1 pb-34">
              <h1 class="main-1__title pt-30">
                지폐를 현금 투입구에 넣고 <strong class="fc-blue">[확인]</strong>을 누르세요.
                <small class="fc-blue">최대150매 100만원까지 입금가능</small>
              </h1>
              <div class="card-input__img-area pt-14 center">
                  <img src="../resources/img/ui/insert_cash.png" alt="">
              </div>
            </div>
    
            <div class="main-bottom mt-30">
              <div class="main-bottom-buttons">
                <div class="button main-button-secondary">
                  <span class="secondary-btn-img"></span>
                  <span class="secondary-btn-title">취소</span>
                </div>
                <div class="button main-button-primary">
                  <span class="primary-btn-img"></span>
                  <span class="primary-btn-title">확인</span>
                </div>                
              </div>
            </div>
          </div>
          
        </div>
      </div>
    </div>
  </body>
</html>
