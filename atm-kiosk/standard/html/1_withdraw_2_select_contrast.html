<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>1_출금_2_(출금)거래선택</title>
  </head>
   <body class="high-contrast">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__title">거래선택</div>
            <div class="header__buttons">
              <div class="header__sound">
                <button class="button header__sound-button" aria-label="음량 줄이기"><span class="header__sound-icon--minus"></span></button>
                <div class="header__sound-status">
                  <span class="header__sound-icon--volume" aria-hidden="true"></span>
                  <span class="header__sound-level" aria-live="polite">100<small>%</small></small></span>
                </div>
                <button class="button header__sound-button" aria-label="음량 키우기"><span class="header__sound-icon--plus"></span></button>
              </div>            
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button__icon--play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="도움기능">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">도움기능</span>
              </button>
            </div>
          </div>
          
          <div class="main pt-30">
            <div class="main-3">
              <div class="main-3-left">
                <button class="button main_button__wt">바이오인증</button>
                <button class="button main_button__wt">간편앱 출금</button>
                <button class="button main_button__wt">NIA 포인트</button>
                <button class="button main_button__wt">창구 연계 출금</button>
                <button class="button main_button__wt">삼성월렛</button>
              </div>
              <div class="main-3-center main-3-center-box">
                <div class="main-3-center__title">원하시는 거래를 <br/> 선택하세요.</div>
                <div class="main-3-center__desc mt-55">통장 및 무매체 거래는 <br>창구에서 거래신청한 <br>계좌만 가능합니다.</div>
              </div>
              <div class="main-3-right">
                <button class="button main_button__wt">카드</button>
                <button class="button main_button__wt">통장</button>
                <button class="button main_button__wt">무통장/무카드</button>
                <button class="button main_button__wt">모바일 현금카드</button>
                <button class="button main_button__wt">전자통장</button>
              </div>
            </div>
    
            <div class="main-bottom mt-16">
              <div class="main-bottom-buttons">
                <div class="button main-button-secondary">
                  <span class="secondary-btn-img"></span>
                  <span class="secondary-btn-title">취소</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
