<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_기본 프로세스 (신용카드)_2_메뉴선택</title>
    <style> 
      .container-body {
        scale: 1.42;      
      }
    </style>       
  </head>
  <body class="high-contrast">
    <div class="container-wrap">    
      <div class="container">
        <div class="container-body">

          <div class="header header--sub">
            <button type="button" class="button header__button" aria-label="처음으로">
              <span class="header__icon header__icon--home" aria-hidden="true"></span>
              <span class="header__button-text">처음으로</span>
            </button>
            <div class="header__actions">     
              <div class="header__action header__action--call">
                <span class="header__icon header__icon--call" aria-hidden="true"></span>
                <span class="header__action-text">문의 1600-0000</span>
              </div>
            </div>
          </div>
          
          <div class="progress-steps">
            <div class="progress-step progress-step--current" aria-current="step">
              <div class="progress-step__index"><span><strong>1</strong></span></div>
              <div class="progress-step__label">메뉴선택</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>2</strong></span></div>
              <div class="progress-step__label">내역확인</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>3</strong></span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>4</strong></span></div>
              <div class="progress-step__label">음료제조</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>5</strong></span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <main class="main">  
            <div class="category-nav">
              <button class="category-nav__btn category-nav__btn--disabled" aria-label="이전 카테고리">
                <span class="category-nav__icon category-nav__icon--prev"></span>
              </button>
              <div class="category-nav__list">
                <button class="category-nav__item category-nav__item--active">전체</button>
                <button class="category-nav__item">아이스</button>
                <button class="category-nav__item">핫</button>
                <button class="category-nav__item">디카페인</button>
              </div>
              <button class="category-nav__btn" aria-label="다음 카테고리">
                <span class="category-nav__icon category-nav__icon--next"></span>
              </button>
            </div>

            <div class="product-grid">
              <div class="product-list">
                <div class="product-card">
                  <div class="product-card__badge product-card__badge--hot"></div>
                  <div class="product-card__image-box"><img src="../resources/img/ui/img_goods_sample.png" alt=""></div>
                  <div class="product-card__info">
                    <div class="product-card__name">핑거 아메리카노</div>
                    <div class="product-card__price">1,100원</div>
                  </div>
                </div>

                <div class="product-card">
                  <div class="product-card__badge product-card__badge--hot"></div>
                  <div class="product-card__image-box"><img src="../resources/img/ui/img_goods_sample.png" alt=""></div>
                  <div class="product-card__info">
                    <div class="product-card__name">골드 아메리카노</div>
                    <div class="product-card__price">1,000원</div>
                  </div>
                </div>

                <div class="product-card">
                  <div class="product-card__badge product-card__badge--hot"></div>
                  <div class="product-card__image-box"><img src="../resources/img/ui/img_goods_sample.png" alt=""></div>
                  <div class="product-card__info">                  
                    <div class="product-card__name">핑거 카페라떼</div>
                    <div class="product-card__price">1,500원</div>
                  </div>
                </div>

                <div class="product-card">
                  <div class="product-card__badge product-card__badge--ice"></div>
                  <div class="product-card__image-box"><img src="../resources/img/ui/img_goods_sample.png" alt=""></div>
                  <div class="product-card__info">                    
                    <div class="product-card__name">아이스 바닐라라떼</div>
                    <div class="product-card__price">2,000원</div>
                  </div>
                </div>

                <div class="product-card">
                  <div class="product-card__badge product-card__badge--ice"></div>
                  <div class="product-card__image-box"><img src="../resources/img/ui/img_goods_sample.png" alt=""></div>
                  <div class="product-card__info">                  
                    <div class="product-card__name">아이스 고구마라떼</div>
                    <div class="product-card__price">2,000원</div>
                  </div>
                </div>

                <div class="product-card">
                  <div class="product-card__badge product-card__badge--ice"></div>
                  <div class="product-card__image-box"><img src="../resources/img/ui/img_goods_sample.png" alt=""></div>
                  <div class="product-card__info">                  
                    <div class="product-card__name">아이스 녹차라떼</div>
                    <div class="product-card__price">2,000원</div>
                  </div>
                </div>

                <div class="product-card">
                  <div class="product-card__badge product-card__badge--hot"></div>
                  <div class="product-card__image-box"><img src="../resources/img/ui/img_goods_sample.png" alt=""></div>
                  <div class="product-card__info">                  
                    <div class="product-card__name">복숭아 아이스티</div>
                    <div class="product-card__price">2,000원</div>
                  </div>
                </div>

                <div class="product-card">
                  <div class="product-card__badge product-card__badge--hot"></div>
                  <div class="product-card__image-box"><img src="../resources/img/ui/img_goods_sample.png" alt=""></div>
                  <div class="product-card__info">                     
                    <div class="product-card__name">청포도 에이드</div>
                    <div class="product-card__price">2,500원</div>
                  </div>
                </div>

                <div class="product-card">
                  <div class="product-card__badge product-card__badge--hot"></div>
                  <div class="product-card__image-box"><img src="../resources/img/ui/img_goods_sample.png" alt=""></div>
                  <div class="product-card__info">                     
                    <div class="product-card__name">자몽 에이드</div>
                    <div class="product-card__price">2,500원</div>
                  </div>                    
                </div>
              </div>
              <div class="pagination pagination--horizontal">
                <button class="pagination__button pagination__button--prev" aria-label="이전 페이지" disabled>
                  <span class="pagination-icon-arrow-prev"></span>
                </button>
                <span class="pagination__page"><strong>1</strong>/1</span>
                <button class="pagination__button pagination__button--next" aria-label="다음 페이지">
                  <span class="pagination-icon-arrow-next"></span>
                </button>
              </div>
            </div>

            <div class="cart" role="region" aria-label="바코드 스캔중">
              <div class="cart__header">
                <div>장바구니</div>
                <div><button class="cart__header-btn">비우기</button></div>
              </div>
              <div class="cart__content">
                <div class="cart__list">
                  <div class="cart__items">
                    <div class="cart-item">
                      <div class="cart-item__name">핑거 아메리카노(핫)</div>
                      <div class="cart-item__quantity">
                        <button class="cart-item__btn" aria-label="수량 감소" disabled><span class="cart-item__icon--minus"></span></button>
                        <span class="cart-item__count">1</span>
                        <button class="cart-item__btn" aria-label="수량 증가"><span class="cart-item__icon--plus"></span></button>
                      </div>
                      <div class="cart-item__price">
                        1,100원
                        <button class="cart-item__delete" aria-label="삭제"><span class="cart-item__icon--delete"></span></button>
                      </div>
                    </div>
                    <div class="cart-item">
                      <div class="cart-item__name">복숭아 아이스티(아이스)</div>
                      <div class="cart-item__quantity">
                        <button class="cart-item__btn" aria-label="수량 감소" disabled><span class="cart-item__icon--minus"></span></button>
                        <span class="cart-item__count">2</span>
                        <button class="cart-item__btn" aria-label="수량 증가"><span class="cart-item__icon--plus"></span></button>
                      </div>
                      <div class="cart-item__price">
                        4,000원
                        <button class="cart-item__delete" aria-label="삭제"><span class="cart-item__icon--delete"></span></button>
                      </div>
                    </div>
                  </div>
                </div>
                <!-- Scroll -->
                <div class="cart-scroll__wrap">
                  <div class="cart-scroll">
                    <button class="cart-scroll__btn" aria-label="이전 페이지" disabled>
                      <span class="scroll-icon-up"></span>
                    </button>
                    <span class="cart-scroll__page"><strong>1</strong>/1</span>
                    <button class="cart-scroll__btn" aria-label="다음 페이지" disabled>
                      <span class="scroll-icon-down"></span>
                    </button>
                  </div>   
                </div>
              </div>
            </div>

            <div class="cart__action">
              <div class="cart__payment">
                <div class="cart__summary">
                  <div class="cart__summary-row">
                    <span class="cart__summary-label">총 수량</span>
                    <span class="cart__summary-price">3개</span>
                  </div>
                  <div class="cart__summary-row">
                    <span class="cart__summary-label">금액</span>
                    <span class="cart__summary-discount"><strong class="cart__summary-accent">5,100원</strong></span>
                  </div>
                </div>
              </div>              
              <div class="cart__pay">                
                <button type="button" class="cart__pay-button">
                  <span class="cart__pay-text">주문하기</span>                    
                </button>
              </div> 
            </div>    
          </main>

          <footer class="control-bar control-bar--no-bg">
            <div class="control-bar__buttons">
              <button type="button" class="accessibility__button accessibility__button--high-contrast accessibility__button--active">
                <span class="accessibility__text">고대비</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--lower-screen">
                <span class="accessibility__text">낮은화면</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--full-screen">
                <span class="accessibility__text">화면확대</span>
              </button>
            </div>
            <div class="control-bar__sound">
              <button type="button" class="control-bar__sound-button" aria-label="음량 줄이기">
                <span class="control-bar__sound-icon control-bar__sound-icon--minus" aria-hidden="true"></span>
              </button>
              <div class="control-bar__sound-status">
                <span class="control-bar__sound-icon control-bar__sound-icon--volume" aria-hidden="true"></span>
                <span class="control-bar__sound-level" aria-live="polite">3</span>
              </div>
              <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
                <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
              </button>
            </div>
          </footer>
        </div>

        <div class="zoom-control-wrap">
          <div class="zoom-control">
            <div class="zoom-control__arrows">
              <button class="arrow-button arrow-button--up" aria-label="화면 위로 이동">
                <span class="arrow-button--up-img"></span>
              </button>
              <button class="arrow-button arrow-button--left" aria-label="화면 왼쪽으로 이동">
                <span class="arrow-button--left-img"></span>
              </button>
              <button class="arrow-button arrow-button--right" aria-label="화면 오른쪽으로 이동">
                <span class="arrow-button--right-img"></span>
              </button>
              <button class="arrow-button arrow-button--down" aria-label="화면 아래로 이동">
                <span class="arrow-button--down-img"></span>
              </button>
            </div>      
            <button class="zoom-control__close" aria-label="확대 기능 끄기">
              <span class="zoom-control__close__icon" aria-hidden="true"></span>
              <span class="zoom-control__close__text">확대 끄기</span>
            </button>
          </div>
        </div>   

      </div>
    </div>
  </body>
</html>
