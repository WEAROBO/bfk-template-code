<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>1_기본화면_1_메인</title>
    <style> 
      .container-body {
        scale: 1.7;
        padding-right: 30px;
        padding-bottom: 70px !important;
      }
     </style>         
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">
     
          <div class="header">
            <div class="header__logo"></div>
            <div class="header__buttons">          
              <button class="button header__button" aria-label="음량">
                <span class="button__title">음량</span>
                <span class="button__title fc-accent">2</span>
              </button>
              <button class="button header__button-after" aria-label="고대비">
                <span class="button__title">고대비</span>
              </button>
              <button class="button header__button-after header__button-lg" aria-label="화면확대">
                <span class="button__title">화면확대</span>
              </button>
              <button class="button header__button header__button-call" aria-label="직원문의">
                <span class="button__title">직원문의</span>
              </button>               
            </div>
          </div>
          
          <div class="main">
            <div class="main-home">
              <h2 class="main-home__title">자원순환보증금 1회용 컵 반납기입니다</h2>
      
              <div class="main-home__wrap">
                <div class="main-home__image">
                  <img src="../resources/img/svg/main_home.svg" alt="">
                </div>
                <div class="main-home__buttons">
                  <div class="button main-home__button">
                    <span class="main-home__button-img"></span>
                    <span class="main-home__button-text">컵 반환 시작하기</span>                    
                  </div>
                </div>
              </div>

              <div class="main-home__qrs">
                <button type="button" class="button main-home__googleplay" aria-label="구글 플레이스토어 이동">
                  <span class="main-home__icon-qr googleplay"></span>
                  <span class="main-home__btn-googleplay"></span>
                </button>
                <button type="button" class="button main-home__appstore" aria-label="애플 앱스토어 이동">
                  <span class="main-home__icon-qr appstore"></span>
                  <span class="main-home__btn-appstore"></span>
                </button>
              </div>

            </div>
          </div>
        </div>

        <div class="zoom-bar-wrap">
          <div class="zoom-bar">
            <button class="zoom-control__close" aria-label="확대 기능 끄기">
              <span class="zoom-control__close__icon" aria-hidden="true"></span>
              <span class="zoom-control__close__text">확대 끄기</span>
            </button>                    
            <div class="zoom-bar__arrows">
              <button class="zoom-bar-arrow-button" aria-label="화면 위로 이동"><span class="arrow-button--up-img"></span></button>
              <button class="zoom-bar-arrow-button" aria-label="화면 아래로 이동"><span class="arrow-button--down-img"></span></button>
              <button class="zoom-bar-arrow-button" aria-label="화면 왼쪽으로 이동"><span class="arrow-button--left-img"></span></button>
              <button class="zoom-bar-arrow-button" aria-label="화면 오른쪽으로 이동"><span class="arrow-button--right-img"></span></button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>
      const containerBody = document.querySelector('.container-body');
      const zoomBarWrap = document.querySelector('.zoom-bar-wrap');

      if (containerBody && zoomBarWrap) {
        const computedStyle = window.getComputedStyle(containerBody);        
        const scaleValue = parseFloat(computedStyle.getPropertyValue('scale')) || 1;
        if (scaleValue > 1) {
          zoomBarWrap.style.bottom = '30px';           
          zoomBarWrap.style.paddingRight = '30px'; 
        }
      }
    </script>  

  </body>
</html>
