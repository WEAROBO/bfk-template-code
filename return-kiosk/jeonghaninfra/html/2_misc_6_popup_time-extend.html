<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_기타화면_6_시간연장</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">
        </div>
      </div>
    </div>

    <div class="backdrop">        
      <div class="modal">                    
        <div class="modal__body">
          <div class="section">
            <div class="section__header">
              <span class="section__icon icon-clock" aria-hidden="true"></span>
              <h1 class="section__title">시간연장</h1>
            </div>

            <div class="section__content">
              <p class="section__message">시간을 연장하시겠습니까?</p>
              <p class="section__message">
                <span class="section__message--highlight">30</span>초 후 <br>
                처음으로 이동합니다.
              </p>
            </div>
          </div>
        </div>
        <div class="modal__footer center">      
          <button class="button modal__button modal__button-secondary" aria-label="처음으로">
            <span class="button__title">처음으로</span>
          </button>             
          <button class="button modal__button modal__button-primary" aria-label="연장하기">
            <span class="button__title">연장하기</span>
          </button>
        </div>   
      </div>        
    </div>

  </body>
</html>
