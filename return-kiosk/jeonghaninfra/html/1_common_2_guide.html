<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>1_기본화면_2_(출금)거래선택</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <button class="button header__button header__button-home" aria-label="처음으로">
              <span class="header__button__icon--home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>            
            <div class="header__buttons">          
              <button class="button header__button" aria-label="음량">
                <span class="button__title">음량</span>
                <span class="button__title fc-accent">2</span>
              </button>
              <button class="button header__button-after" aria-label="고대비">
                <span class="button__title">고대비</span>
              </button>
              <button class="button header__button-after header__button-lg" aria-label="화면확대">
                <span class="button__title">화면확대</span>
              </button>
              <button class="button header__button header__button-call" aria-label="직원문의">
                <span class="button__title">직원문의</span>
              </button>               
            </div>
          </div>         

          
          <div class="main">
            <div class="return-process">
              <h1 class="return-process__title">잠깐~반환방법 한번 더 확인해보세요</h1>
              <div class="return-process__step-container">
                <div class="return-process__step-card">
                  <div class="return-process__step-image">
                    <img src="../resources/img/svg/icon_return-process1.svg" alt="">
                  </div>
                  <p class="return-process__step-text">뚜껑, 빨대 등<br>제거</p>
                  <div class="return-process__arrow"></div>
                </div>
                <div class="return-process__step-card">
                  <div class="return-process__step-image">
                    <img src="../resources/img/svg/icon_return-process2.svg" alt="">
                  </div>
                  <p class="return-process__step-text">모바일<br>개인인증</p>
                  <div class="return-process__arrow"></div>
                </div> 
                <div class="return-process__step-card">
                  <div class="return-process__step-image">
                    <img src="../resources/img/svg/icon_return-process3.svg" alt="">
                  </div>
                  <p class="return-process__step-text">컵 바코드<br>스캔</p>
                  <div class="return-process__arrow"></div>
                </div>
                <div class="return-process__step-card">
                  <div class="return-process__step-image">
                    <img src="../resources/img/svg/icon_return-process4.svg" alt="">
                  </div>
                  <p class="return-process__step-text">반환 내역<br>확인</p>
                </div>
              </div>
            </div> 

            <div class="main__bottoms center">
              <button class="button main__button main__button--primary" aria-label="확인했습니다">
                <span class="main__icon main__icon--next" aria-hidden="true"></span>
                <span class="button__title">확인했습니다</span>
              </button>
            </div>            

          </div>
        </div>
      </div>
    </div>
  </body>
</html>
