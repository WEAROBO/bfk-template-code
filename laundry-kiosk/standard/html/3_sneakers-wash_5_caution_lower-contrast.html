<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>3_운동화 세탁_4_서비스선택</title>
  </head>
  <body class="lower-screen high-contrast">
    <div class="container-wrap">     
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button class="button header__button" aria-label="처음으로">
              <span class="header__button__icon--home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>
            <div class="header__buttons">
              <button class="button header__button header__button--lang" aria-label="lang">
                <span class="header__button__icon--lang" aria-hidden="true"></span>
              </button>
              <button class="button header__button header__button--call" aria-label="직원호출">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">직원호출</span>
              </button>
            </div>
          </div>
          
          <div class="progress-steps">
            <div class="progress-step progress-step--completed">
              <div class="progress-step__index"><span><strong>1</strong></span></div>
              <div class="progress-step__label">로그인</div>
            </div>
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span><strong>2</strong></span></div>
              <div class="progress-step__label">서비스 선택</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>3</strong></span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>4</strong></span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <main class="main main-progress">  
            <h1 class="main__title main__title--progress">운동화 세탁 시 주의사항</h1>

            <div class="info-box">
              <ul class="info-list">
                <li>운동화는 끈을 풀고, 밑창의 흙먼지를 깨끗하게 털어내어 세탁기에 넣어주세요.</li>
                <li>물세탁이 불가능한 가죽, 세무, 털소재, 특수 소재의 운동화는 세탁하지 마세요.</li>
                <li>운동화 외 구두, 장화, 등산화, 부츠, 고무 또는 플라스틱 슬리퍼, 샌들, 특수 신발 등은 절대로 세탁하지 마세요.</li>
                <li class="info-accent">적정량 이상 세탁시 운동화 손상 및 기계고장의 원인이 됩니다.</li>
              </ul>

              <div class="pagination pagination--horizontal">
                <button class="pagination__button" aria-label="이전 페이지" disabled>
                  <span class="pagination-icon-arrow-prev"></span>
                </button>
                <span class="pagination__page"><strong>1</strong> / 3</span>
                <button class="pagination__button" aria-label="다음 페이지">
                  <span class="pagination-icon-arrow-next"></span>
                </button>
              </div>     

            </div>

            <div class="main__bottom-buttons">
              <button class="button main__button main-button-secondary" aria-label="이전 단계로 이동">
                <span class="main__button__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main-button-primary" aria-label="확인">
                <span class="main__button__icon--next" aria-hidden="true"></span>
                <span class="button__title">확인</span>
              </button>              
            </div>
          </main>

          <footer class="control-bar control-bar--no-bg">
            <div class="control-bar__buttons">
              <button type="button" class="accessibility__button accessibility__button--high-contrast accessibility__button--active">
                <span class="accessibility__text">고대비</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--lower-screen accessibility__button--active">
                <span class="accessibility__text">화면 내리기</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--full-screen">
                <span class="accessibility__text">화면확대</span>
              </button>
            </div>
            <div class="control-bar__sound">
              <button type="button" class="control-bar__sound-button" aria-label="음량 줄이기">
                <span class="control-bar__sound-icon control-bar__sound-icon--minus" aria-hidden="true"></span>
              </button>
              <div class="control-bar__sound-status">
                <span class="control-bar__sound-icon control-bar__sound-icon--volume" aria-hidden="true"></span>
                <span class="control-bar__sound-level" aria-live="polite">5</span>
              </div>
              <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
                <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
              </button>
            </div>
          </footer>

        </div>
      </div>
    </div>
    <script>
      let password = ""
      function keyclick(value) {
        console.log("keyclick", value)
        if (value == "delete_all") {
          password = ""
        } else if (value == "delete") {
          if (password.length > 0) {
            password = password.slice(0, password.length - 1);
          }

        } else if (password.length < 4) {
          password += value
        }
        console.log("password", password)
        const input_layer = document.querySelector("#input-pw-box__input-inner")
        input_layer.innerHTML = ''
        for (let i = 0; i < password.length; i++) {
    // <div class="star">*</div>
          let div = document.createElement('div');
          div.innerHTML = '*';
          div.classList.add('star');
          input_layer.appendChild(div)
        }

      }
    </script>  

  </body>
</html>
