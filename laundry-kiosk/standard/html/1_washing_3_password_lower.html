<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>1_세탁기_3_비밀번호 입력</title>
  </head>
  <body class="lower-screen">
    <div class="container-wrap">    
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <div class="header__left">
              <button class="button header__button" aria-label="처음으로">
                <span class="header__button__icon--home" aria-hidden="true"></span>
                <span class="button__title">처음으로</span>
              </button>
            </div>
            <div class="header__right">
              <div class="header__buttons">     
                <div class="header__button--text" aria-label="문의 1600-0000">
                  <span class="header__button__icon--call-bk" aria-hidden="true"></span>
                  <span class="button__title">문의 1600-0000</span>
                </div>
              </div>
            </div>
          </div>
          
          <div class="progress-steps">
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span><strong>1</strong></span></div>
              <div class="progress-step__label">로그인</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>2</strong></span></div>
              <div class="progress-step__label">서비스선택</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>3</strong></span></div>
              <div class="progress-step__label">내역확인</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>4</strong></span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>5</strong></span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <!-- main -->
          <main class="main">  
            <h1 class="main__title main__title--step">
              회원 로그인을 위해 <br class="full-screen">비밀번호를 입력하세요
            </h1>

            <div class="keyboard">
              <div class="phone-input__area">
                <div class="input-pw-box__input">
                  <div class="input-pw-box__input-inner" id="inputPw"></div>
                  <img src="../resources/img/svg/icon_visible-on.svg" id="toggleEye" class="phone-input__toggle" alt="비밀번호 보이기">
                </div>
              </div>

              <div class="phone-keypad">
                <button class="phone-keypad__button" onclick="keyclick('1')">1</button>
                <button class="phone-keypad__button" onclick="keyclick('2')">2</button>
                <button class="phone-keypad__button" onclick="keyclick('3')">3</button>
                <button class="phone-keypad__button" onclick="keyclick('4')">4</button>
                <button class="phone-keypad__button" onclick="keyclick('5')">5</button>
                <button class="phone-keypad__button" onclick="keyclick('6')">6</button>
                <button class="phone-keypad__button" onclick="keyclick('7')">7</button>
                <button class="phone-keypad__button" onclick="keyclick('8')">8</button>
                <button class="phone-keypad__button" onclick="keyclick('9')">9</button>
                <button class="phone-keypad__button type2" onclick="keyclick('delete')">
                  <span class="phone-keypad__icon--del"></span>
                  <small>지우기</small>
                </button>
                <button class="phone-keypad__button" onclick="keyclick('0')">0</button>
                <button class="phone-keypad__button type2" onclick="keyclick('delete_all')">
                  <small>모두 지우기</small>
                </button>
              </div>
            </div> 

            <div class="main__bottom-buttons">
              <button class="button main__button main-button-secondary" aria-label="이전 단계로 이동">
                <span class="main__button__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main-button-primary" aria-label="확인">
                <span class="main__button__icon--next" aria-hidden="true"></span>
                <span class="button__title">확인</span>
              </button>
            </div>          
          </main>

          <footer class="control-bar control-bar--no-bg">
            <div class="control-bar__buttons">
              <button type="button" class="accessibility__button accessibility__button--high-contrast">
                <span class="accessibility__text">고대비</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--lower-screen accessibility__button--active">
                <span class="accessibility__text">낮은화면</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--full-screen">
                <span class="accessibility__text">화면확대</span>
              </button>
            </div>
            <div class="control-bar__sound">
              <button type="button" class="control-bar__sound-button" aria-label="음량 줄이기">
                <span class="control-bar__sound-icon control-bar__sound-icon--minus" aria-hidden="true"></span>
              </button>
              <div class="control-bar__sound-status">
                <span class="control-bar__sound-icon control-bar__sound-icon--volume" aria-hidden="true"></span>
                <span class="control-bar__sound-level" aria-live="polite">3</span>
              </div>
              <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
                <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
              </button>
            </div>
          </footer>       

        </div>
      </div>
    </div>

    <script>
      let password = "0000";  
      let isHidden = false;  

      const inputLayer = document.getElementById("inputPw");
      const toggleEye = document.getElementById("toggleEye");

      function renderPassword() {
        inputLayer.innerHTML = "";
        for (let i = 0; i < password.length; i++) {
          const div = document.createElement("div");
          div.className = "star";
          div.textContent = isHidden ? "*" : password[i];
          inputLayer.appendChild(div);
        }
      }

      function keyclick(value) {
        if (value === "delete_all") {
          password = "";
        } else if (value === "delete") {
          password = password.slice(0, -1);
        } else if (password.length < 4) {
          password += value;
        }
        renderPassword();
      }

      toggleEye.addEventListener("click", () => {
        isHidden = !isHidden;

        toggleEye.src = isHidden
          ? "../resources/img/svg/icon_visible-off.svg" 
          : "../resources/img/svg/icon_visible-on.svg"; 

        toggleEye.alt = isHidden
          ? "비밀번호 숨기기"
          : "비밀번호 보이기";

        renderPassword();
      });

      renderPassword();
    </script>
  </body>
</html>
