<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_물품 찾기_3_비밀번호 입력</title>
  </head>
  <body class="lower-screen">
    <div class="container-wrap">     
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button class="button header__button" aria-label="처음으로">
              <span class="header__button__icon--home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>
            <div class="header__buttons">
              <button class="button header__button header__button--lang" aria-label="lang">
                <span class="header__button__icon--lang" aria-hidden="true"></span>
              </button>
              <button class="button header__button header__button--call" aria-label="직원호출">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">직원호출</span>
              </button>
            </div>
          </div>
          
          <div class="progress-steps">
            <div class="progress-step progress-step--completed">
              <div class="progress-step__index"><span><strong>1</strong></span></div>
              <div class="progress-step__label">사물함 선택</div>
            </div>
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span><strong>2</strong></span></div>
              <div class="progress-step__label">비밀번호 입력</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>3</strong></span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>4</strong></span></div>
              <div class="progress-step__label">완료</div>
            </div>            
          </div>

          <main class="main main-progress">  
            <h1 class="main__title main__title--progress">
              비밀번호를 입력하세요         
            </h1>
            <div class="course-grid__header">
              <span class="course-grid__title"><strong class="course-grid__title-accent">NN번</strong> 사물함</span> 
            </div>            
                
            <div class="keyboard">
              <div class="phone-input__area">
                <div class="otp-container">
                  <div class="otp-input">
                    <div class="otp-input__field">
                      <span class="otp-input__char"></span>
                    </div>
                    <div class="otp-input__field">
                      <span class="otp-input__char"></span>
                    </div>
                    <div class="otp-input__field">
                      <span class="otp-input__char"></span>
                    </div>
                    <div class="otp-input__field">
                      <span class="otp-input__char"></span>
                    </div>
                  </div>
                </div>                
              </div>

              <div class="phone-keypad">
                <button class="phone-keypad__button" onclick="keyclick('1')">1</button>
                <button class="phone-keypad__button" onclick="keyclick('2')">2</button>
                <button class="phone-keypad__button" onclick="keyclick('3')">3</button>
                <button class="phone-keypad__button" onclick="keyclick('4')">4</button>
                <button class="phone-keypad__button" onclick="keyclick('5')">5</button>
                <button class="phone-keypad__button" onclick="keyclick('6')">6</button>
                <button class="phone-keypad__button" onclick="keyclick('7')">7</button>
                <button class="phone-keypad__button" onclick="keyclick('8')">8</button>
                <button class="phone-keypad__button" onclick="keyclick('9')">9</button>
                <button class="phone-keypad__button type2" onclick="keyclick('delete')">
                  <span class="phone-keypad__icon--del"></span>
                  <small>지우기</small>
                </button>
                <button class="phone-keypad__button" onclick="keyclick('0')">0</button>
                <button class="phone-keypad__button type2" onclick="keyclick('delete_all')">
                  <small>모두<br>지우기</small>
                </button>
              </div>
            </div> 

            <div class="main__bottoms">
              <button class="button main__button main__button--secondary" aria-label="이전">
                <span class="main__icon main__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main__button--primary" aria-label="확인" disabled>
                <span class="main__icon main__icon--next" aria-hidden="true"></span>
                <span class="button__title">확인</span>
              </button>              
            </div>            
          </main>

          <footer class="control-bar control-bar--no-bg">
            <div class="control-bar__buttons">
              <button type="button" class="accessibility__button accessibility__button--high-contrast">
                <span class="accessibility__text">고대비</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--lower-screen accessibility__button--active">
                <span class="accessibility__text">화면 내리기</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--full-screen">
                <span class="accessibility__text">화면확대</span>
              </button>
            </div>
            <div class="control-bar__sound">
              <button type="button" class="control-bar__sound-button" aria-label="음량 줄이기">
                <span class="control-bar__sound-icon control-bar__sound-icon--minus" aria-hidden="true"></span>
              </button>
              <div class="control-bar__sound-status">
                <span class="control-bar__sound-icon control-bar__sound-icon--volume" aria-hidden="true"></span>
                <span class="control-bar__sound-level" aria-live="polite">5</span>
              </div>
              <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
                <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
              </button>
            </div>
          </footer>

        </div>
      </div>
    </div>

    <script>
      let password = "";
      const otpFields = Array.from(document.querySelectorAll(".otp-input__field"));
      const confirmButton = document.querySelector(".main__button--primary");

      function renderPassword() {
        otpFields.forEach((field, index) => {
          const charEl = field.querySelector(".otp-input__char");
          const hasValue = index < password.length;
          field.classList.remove("otp-input__field--filled", "otp-input__field--active");
          charEl.textContent = hasValue ? "*" : "";
          if (hasValue) {
            field.classList.add("otp-input__field--filled");
          }
        });

        const activeIndex = Math.min(password.length, otpFields.length - 1);
        if (password.length < otpFields.length) {
          otpFields[activeIndex].classList.add("otp-input__field--active");
        }

        confirmButton.disabled = password.length !== 4;
      }

      function keyclick(value) {
        if (value === "delete_all") {
          password = "";
        } else if (value === "delete") {
          password = password.slice(0, -1);
        } else if (/^[0-9]$/.test(value) && password.length < 4) {
          password += value;
        }
        renderPassword();
      }

      document.addEventListener("keydown", function (event) {
        if (event.key === "Tab") {
          event.preventDefault();
          const focusableElements = Array.from(document.querySelectorAll('button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])')).filter(function (element) {
            return element.offsetParent !== null;
          });
          if (!focusableElements.length) {
            return;
          }
          const currentIndex = focusableElements.indexOf(document.activeElement);
          const nextIndex = event.shiftKey
            ? (currentIndex <= 0 ? focusableElements.length - 1 : currentIndex - 1)
            : (currentIndex + 1) % focusableElements.length;
          focusableElements[nextIndex].focus();
          return;
        }

        if (event.key === " " || event.code === "Space") {
          event.preventDefault();
          const activeElement = document.activeElement;
          if (activeElement && typeof activeElement.click === "function") {
            activeElement.click();
          }
          return;
        }

        if (/^[0-9]$/.test(event.key)) {
          event.preventDefault();
          keyclick(event.key);
          return;
        }

        if (event.key === "Backspace") {
          event.preventDefault();
          keyclick("delete");
          return;
        }

        if (event.key === "Delete") {
          event.preventDefault();
          keyclick("delete_all");
        }
      });

      renderPassword();
    </script>    
  </body>
</html>
