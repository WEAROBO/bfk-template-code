<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_물품 보관_4_물품 수령자 전화번호 입력</title>
  </head>
  <body class="lower-screen">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header">
            <div class="header__utils">
              <div class="header__util-item header__util-item--contact" aria-label="문의 전화 1600-0000">
                <span class="header__icon header__icon--phone" aria-hidden="true"></span>
                <span class="header__text">1600-0000</span>
              </div>
              <div class="header__util-item header__util-item--time" aria-label="현재 시간">
                <span class="header__text">12/31 (금) 오후 12:59</span>
              </div>
            </div>
            <div class="header__content">
              <button class="button header__button" aria-label="처음으로">
                <span class="header__icon header__icon--home" aria-hidden="true"></span>
                <span class="header__button-text">처음으로</span>
              </button>
              <div class="header__logo"></div>
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__icon header__icon--help" aria-hidden="true"></span>
                <span class="header__button-text">안내듣기</span>
              </button>
            </div>
          </div>
          
          <div class="progress-steps">
            <div class="progress-step progress-step--completed">
              <div class="progress-step__index"><span><strong>1</strong></span></div>
              <div class="progress-step__label">보관자 정보</div>
            </div>
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span><strong>2</strong></span></div>
              <div class="progress-step__label">찾으실분 정보</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span><strong>3</strong></span></div>
              <div class="progress-step__label">물품 보관</div>
            </div>
          </div>

          <main class="main">  
            <h1 class="main__title main__title--step">물품 찾으실 분의 <br class="full-screen">전화번호를 입력하세요</h1>
            <div class="keyboard">
              <div class="phone-input__area">
                <input type="text" id="phoneInput" class="phone-input__field" value="010 - 1234 - 5678" readonly>
                <img src="../resources/img/svg/icon_visible-on.svg" id="toggleEye" class="phone-input__toggle" alt="전화번호 숨기기">
              </div>
              <div class="phone-keypad">
                <button class="phone-keypad__button">1</button>
                <button class="phone-keypad__button">2</button>
                <button class="phone-keypad__button">3</button>
                <button class="phone-keypad__button">4</button>
                <button class="phone-keypad__button">5</button>
                <button class="phone-keypad__button">6</button>
                <button class="phone-keypad__button">7</button>
                <button class="phone-keypad__button">8</button>
                <button class="phone-keypad__button">9</button>
                <button class="phone-keypad__button type2" data-action="delete">
                  <span class="phone-keypad__icon--del" aria-hidden="true"></span>
                  <small>지우기</small>
                </button>
                <button class="phone-keypad__button">0</button>
                <button class="phone-keypad__button type2">010</button>
              </div>
            </div>

            <div class="main__bottoms">
              <button class="button main__button main__button--secondary" aria-label="이전">
                <span class="main__icon main__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main__button--primary" aria-label="확인">
                <span class="main__icon main__icon--next" aria-hidden="true"></span>
                <span class="button__title">확인</span>
              </button>              
            </div>
          </main>

          <footer class="control-bar control-bar--no-bg">
            <div class="control-bar__buttons">
              <button type="button" class="accessibility__button accessibility__button--high-contrast">
                <span class="accessibility__text">고대비</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--lower-screen accessibility__button--active">
                <span class="accessibility__text">낮은화면</span>
              </button>
              <button type="button" class="accessibility__button accessibility__button--full-screen">
                <span class="accessibility__text">화면확대</span>
              </button>
            </div>
            <div class="control-bar__sound">
              <button type="button" class="control-bar__sound-button" aria-label="음량 줄이기">
                <span class="control-bar__sound-icon control-bar__sound-icon--minus" aria-hidden="true"></span>
              </button>
              <div class="control-bar__sound-status">
                <span class="control-bar__sound-icon control-bar__sound-icon--volume" aria-hidden="true"></span>
                <span class="control-bar__sound-level" aria-live="polite">3</span>
              </div>
              <button type="button" class="control-bar__sound-button" aria-label="음량 키우기">
                <span class="control-bar__sound-icon control-bar__sound-icon--plus" aria-hidden="true"></span>
              </button>
            </div>
          </footer>

        </div>
      </div>
    </div>

    <script>
      const input = document.getElementById("phoneInput");
      const buttons = document.querySelectorAll(".phone-keypad__button");
      const toggleEye = document.getElementById("toggleEye");
      let phoneValue = "01012345678";

      function formatPhone(num) {
        num = num.replace(/[^0-9]/g, "");
        if (num.length < 4) return num;
        if (num.length < 8) return num.replace(/(\d{3})(\d{1,4})/, "$1 - $2");
        return num.replace(/(\d{3})(\d{4})(\d{1,4})/, "$1 - $2 - $3");
      }

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const action = btn.dataset.action;
          const val = btn.textContent.trim().replace(/[^0-9]/g, ''); 

          if (action === "delete") {
            // **수정된 부분: 마지막 문자 하나만 제거**
            phoneValue = phoneValue.slice(0, -1);
          } else if (action === "clear") {
            phoneValue = "";
          } else if (val) {
            if (phoneValue.length < 11) {
              phoneValue += val;
            }
          }
          input.value = formatPhone(phoneValue);
        });
      });

      let isHidden = false; 
      toggleEye.addEventListener("click", () => {
        isHidden = !isHidden;
        
        input.type = isHidden ? "password" : "text"; 
        
        toggleEye.src = isHidden
          ? "../resources/img/svg/icon_visible-off.svg"
          : "../resources/img/svg/icon_visible-on.svg";
          
        toggleEye.alt = isHidden ? "전화번호 보이기" : "전화번호 숨기기"; 
      });
    </script>

  </body>
</html>
