<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_물품 보관_8_추가 보관 알림</title>
  </head>
  <body>
    <div class="container-wrap">    
      <div class="container">
        <div class="container-body symbol-bg">
          <div class="header">
            <div class="header__utils">
              <div class="header__util-item header__util-item--contact" aria-label="문의 전화 1600-0000">
                <span class="header__icon header__icon--phone" aria-hidden="true"></span>
                <span class="header__text">문의 1600-0000</span>
              </div>
              <div class="header__util-item header__util-item--time" aria-label="현재 시간">
                <span class="header__text">12/31 (금) 오후 12:59</span>
              </div>
            </div>
          </div>          
          <main class="main main--home symbol-bg">
            <h1 class="main__title main__title--confirm">
              계속해서 물품을 <br>보관하시겠습니까?
            </h1>

            <div class="main__buttons center">
              <button class="button main__button main__button--secondary" aria-label="아니오">
                <span class="button__title">아니오</span>
              </button>
              <button class="button main__button main__button--secondary" aria-label="예">
                <span class="button__title">예</span>
              </button>
            </div>

            <h4 class="main__title--confirm-desc">
              방금 넣은 물품 보관을 취소하고 싶으면
            </h4>            
            <div class="main__buttons center">
              <button class="button main__button main__button--secondary" aria-label="보관 취소">
                <span class="button__title">보관 취소</span>
              </button>
            </div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
