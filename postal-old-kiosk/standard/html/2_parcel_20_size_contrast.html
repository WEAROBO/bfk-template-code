<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_소포접수_20_소포크기선택</title>
  </head>
  <body class="high-contrast">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button class="button header__button" aria-label="처음으로">
              <span class="header__button__icon--home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>
            <div class="header__buttons">
              <button class="button header__button button-md" aria-label="사운드">
                <span class="header__button__icon--sound" aria-hidden="true"></span>
              </button>
              <button class="button header__button" aria-label="다시듣기">
                <span class="header__button__icon--play" aria-hidden="true"></span>
                <span class="button__title">다시듣기</span>
              </button>
              <button class="button header__button" aria-label="도움기능">
                <span class="header__button__icon--help" aria-hidden="true"></span>
                <span class="button__title">도움기능</span>
              </button>
              <button class="button header__button header__button--call" aria-label="직원호출">
                <span class="header__button__icon--call" aria-hidden="true"></span>
                <span class="button__title">직원호출</span>
              </button>            
            </div>
          </div>  
          
          <div class="progress-steps">
            <div class="progress-step progress-step--completed">
              <div class="progress-step__index"><span>1</span></div>
              <div class="progress-step__label">우편물 정보</div>
            </div>
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span>2</span></div>
              <div class="progress-step__label">접수정보</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>3</span></div>
              <div class="progress-step__label">요금확인</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>4</span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>5</span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <main class="main">  
            <h1 class="main__title main__title--step main__title--small">접수할 우편물의 크기를 선택하세요.</h1>

            <ul class="post-item-grid">
              <li><button class="item">80cm<br>이하</button></li>
              <li><button class="item">81~<br>100cm</button></li>
              <li><button class="item">101~<br>120cm</button></li>
              <li><button class="item">121~<br>160cm</button></li>
            </ul>

            <div class="info-box mt-30">
              <ul class="info-list">
                <li class="info-list__cell">우편물의 크기는 가로+세로+높이를 더한 값입니다.</li>
                <li class="info-list__cell">중량은 최대 30kg 이하, 크기는 최대 160cm 이하입니다.</li>
                <li class="info-list__cell">한 번의 최대 길이는 100cm 이하여야 접수 가능합니다.</li>
                <li class="info-list__cell">중량/크기 중 큰 값을 기준하여 요금이 적용됩니다.</li>
              </ul>
            </div>

            <div class="main__bottom-buttons">
              <button class="button main__button main-button-secondary" aria-label="이전 단계로 이동">
                <span class="main__button__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
            </div>
          </main>

        </div>
      </div>
    </div>
  </body>
</html>
