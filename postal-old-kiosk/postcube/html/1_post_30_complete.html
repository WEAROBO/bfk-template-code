<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>1_우편접수_30_완료</title>
  </head>
  <body>
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">
            <div class="complete-box" role="status" aria-live="polite">
              <h1 class="complete__title">이용해 주셔서 감사합니다.</h1>
              <h2 class="complete__message">놓고 가시는 물건은 없는지 다시 한번 확인하여 주세요.</h2>
              <p class="complete__desc">
                <span id="count" class="complete__count--highlight">5</span> <span class="complete__count">초 후</span><br>처음으로 돌아갑니다.
              </p>
            </div>
        </div>
      </div>
    </div>

    <script>
    let seconds = 5;
    const counter = document.getElementById("count");

    const countdown = setInterval(() => {
      seconds--;
      counter.textContent = seconds;

      if (seconds === 0) {
        clearInterval(countdown);
        window.location.href = "1_post_1_main.html";
      }
    }, 1000);
    </script>    

  </body>
</html>
