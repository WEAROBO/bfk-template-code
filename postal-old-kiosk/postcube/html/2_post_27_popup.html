<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../resources/css/index.css">
    <title>2_우편접수_26_약관 동의</title>
  </head>
  <body class="">
    <div class="container-wrap">
      <div class="container">
        <div class="container-body">

          <div class="header header--no-bg">
            <button class="button header__button" aria-label="처음으로">
              <span class="header__button--icon header__button--icon-home" aria-hidden="true"></span>
              <span class="button__title">처음으로</span>
            </button>
            <div class="header__buttons">
              <button class="button header__button button-md" aria-label="사운드">
                <span class="header__button--icon header__button--icon-sound" aria-hidden="true"></span>
              </button>
              <button class="button header__button" aria-label="안내듣기">
                <span class="header__button--icon header__button--icon-play" aria-hidden="true"></span>
                <span class="button__title">안내듣기</span>
              </button>
              <button class="button header__button" aria-label="접근성">
                <span class="header__button--icon header__button--icon-help" aria-hidden="true"></span>
                <span class="button__title">접근성</span>
              </button>
              <button class="button header__button header__button--call" aria-label="직원호출">
                <span class="header__button--icon header__button--icon-call" aria-hidden="true"></span>
                <span class="button__title">직원호출</span>
              </button>           
            </div>
          </div>  
          
          <div class="progress-steps">
            <div class="progress-step progress-step--current">
              <div class="progress-step__index"><span>1</span></div>
              <div class="progress-step__label">우편물 정보</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>2</span></div>
              <div class="progress-step__label">접수정보</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>3</span></div>
              <div class="progress-step__label">요금확인</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>4</span></div>
              <div class="progress-step__label">결제</div>
            </div>
            <div class="progress-step">
              <div class="progress-step__index"><span>5</span></div>
              <div class="progress-step__label">완료</div>
            </div>
          </div>

          <main class="main">  
            <h1 class="main__title main__title--step main__title--small">
              약관을 확인하신 후 동의하세요 
              <small>(3/4)</small>            
            </h1>  

            <div class="policy-list">
              <div class="policy-box ">
                <label class="policy-box__left">
                  <button type="button" class="policy-box__checkbox" aria-pressed="false" aria-label="이용약관 동의">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                  </button>
                  <span class="policy-box__text">이용약관 동의</span>
                </label>                    
                <button class="policy-box__btn" type="button">
                  <span class="policy-box__btn--text">보기</span>
                  <span class="policy-box__btn--icon-more"></span>
                </button>
              </div>      
              <div class="policy-box">
                <label class="policy-box__left">
                  <button type="button" class="policy-box__checkbox" aria-pressed="false" aria-label="주민등록번호 수집 처리 동의">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                  </button>
                  <span class="policy-box__text">주민등록번호 수집 처리 동의</span>
                </label>                    
                <button class="policy-box__btn" type="button">
                  <span class="policy-box__btn--text">보기</span>
                  <span class="policy-box__btn--icon-more"></span>
                </button>
              </div>  
              <div class="policy-box">
                <label class="policy-box__left">
                  <button type="button" class="policy-box__checkbox" aria-pressed="false" aria-label="개인정보 수집 및 이용 동의">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                  </button>
                  <span class="policy-box__text">개인정보 수집 및 이용 동의</span>
                </label>                    
                <button class="policy-box__btn" type="button">
                  <span class="policy-box__btn--text">보기</span>
                  <span class="policy-box__btn--icon-more"></span>
                </button>
              </div>      
              <div class="policy-box">
                <label class="policy-box__left">
                  <button type="button" class="policy-box__checkbox" aria-pressed="false" aria-label="개인정보 제공 및 위탁">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                  </button>
                  <span class="policy-box__text">개인정보 제공 및 위탁</span>
                </label>                    
                <button class="policy-box__btn" type="button">
                  <span class="policy-box__btn--text">보기</span>
                  <span class="policy-box__btn--icon-more"></span>
                </button>
              </div>              
            </div>
            <div class="main__title-desc">
              약관에 모두 동의 하셔야 ‘다음’ 으로 진행하실 수 있습니다.
            </div>  

            <div class="main__bottom-buttons">
              <button class="button main__button main-button-secondary" aria-label="이전">
                <span class="main__button__icon--prev" aria-hidden="true"></span>
                <span class="button__title">이전</span>
              </button>
              <button class="button main__button main-button-primary main-button-disabled" aria-label="다음" disabled>
                <span class="main__button__icon--next" aria-hidden="true"></span>
                <span class="button__title">다음</span>
              </button>             
            </div>
          </main>

        </div>
      </div>
    </div>

    <div class="backdrop">        
      <div class="modal modal--lg">            
        <h2 class="modal__title">이용약관 동의</h2>
        <div class="modal__body">        

          <div class="terms-viewer">
            <!-- 약관 본문 -->
            <div class="terms-viewer__content">
              <div class="terms-viewer__scroll" id="termsScroll">
                <div class="terms-viewer__title">통신과금서비스 이용약관</div>
                <div class="terms-viewer__section">
                  <strong>제1조 (목적)</strong>
                  본 약관은 통신과금서비스를 제공하는 에스케이텔링크 주식회사(이하 '회사'라 합니다)와 통신과금서비스 이용자(이하 '이용자'라 합니다) 간에 통신과금서비스에 관한 회사와 이용자의 권리와 의무, 기타 제반 사항을 정함을 목적으로 합니다.
                </div>
                <div class="terms-viewer__section">
                  <strong>제2조 (용어의 정의)</strong>
                </div>
              </div>
            </div>
            <div class="pagination">
              <button class="pagination__button" aria-label="이전 페이지"><img src="../resources/img/svg/icon-arrow-up.svg" alt=""></button>
              <span class="pagination__page"><strong>1</strong>/3</span>
              <button class="pagination__button" aria-label="다음 페이지"><img src="../resources/img/svg/icon-arrow-down.svg" alt=""></button>
            </div>            
          </div>
        </div>
        <div class="modal__footer center">         
          <button class="button main__button main-button-secondary" aria-label="닫기">
            <span class="button__title">닫기</span>
          </button>        
        </div>   
      </div>        
    </div>    

  </body>
</html>
